naftiko: 1.0.0-alpha2
info:
  title: Shared Backstage Catalog
  description: A shared Backstage catalog capability hosting Naftiko-managed entities for cross-team discovery.
  tags: [Naftiko, Backstage, Shared]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: backstage-env
  keys: {BACKSTAGE_HOST: BACKSTAGE_HOST, BACKSTAGE_TOKEN: BACKSTAGE_TOKEN}
capability:
  consumes:
  - namespace: backstage
    type: http
    baseUri: https://{{BACKSTAGE_HOST}}
    authentication: {type: bearer, token: '{{BACKSTAGE_TOKEN}}'}
    resources:
    - {name: entities, path: /api/catalog/entities, operations: [{name: list-entities, method: GET}, {name: upsert-entity, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: shared-backstage-catalog-rest
    description: REST surface for the shared catalog.
    resources:
    - {name: entities, path: /entities, operations: [{method: GET, name: list-entities, call: backstage.list-entities}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: shared-backstage-catalog-mcp
    description: MCP for the shared catalog.
    tools:
    - {name: list-entities, hints: {readOnly: true}, call: backstage.list-entities}
    - {name: upsert-entity, call: backstage.upsert-entity}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: shared-backstage-catalog-skills
    description: Skill for the shared catalog.
    skills:
    - name: shared-backstage-catalog
      description: Shared Backstage catalog.
      location: file:///opt/naftiko/skills/shared-backstage-catalog
      allowed-tools: list-entities,upsert-entity
      tools:
      - {name: list-entities, from: {sourceNamespace: shared-backstage-catalog-mcp, action: list-entities}}
      - {name: upsert-entity, from: {sourceNamespace: shared-backstage-catalog-mcp, action: upsert-entity}}
