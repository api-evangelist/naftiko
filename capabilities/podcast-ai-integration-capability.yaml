naftiko: 1.0.0-alpha2
info:
  title: Podcast Ai Integration Capability
  description: A capability over podcast platforms (Spotify, Apple, Listen Notes) for AI-driven podcast research and outreach.
  tags: [Naftiko, Podcast, AI]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: listennotes-env
  keys: {LISTENNOTES_API_KEY: LISTENNOTES_API_KEY}
capability:
  consumes:
  - namespace: listennotes
    type: http
    baseUri: https://listen-api.listennotes.com
    authentication: {type: bearer, token: '{{LISTENNOTES_API_KEY}}'}
    resources:
    - {name: search, path: /api/v2/search, operations: [{name: search-podcasts, method: GET}]}
    - name: podcast
      path: /api/v2/podcasts/{{podcast_id}}
      operations:
      - {name: get-podcast, method: GET, inputParameters: [{name: podcast_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: podcast-ai-integration-capability-rest
    description: REST surface for podcast AI research.
    resources:
    - {name: search, path: /search, operations: [{method: GET, name: search-podcasts, call: listennotes.search-podcasts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: podcast-ai-integration-capability-mcp
    description: MCP for podcast AI research.
    tools:
    - {name: search-podcasts, hints: {readOnly: true}, call: listennotes.search-podcasts}
    - name: get-podcast
      hints: {readOnly: true}
      inputParameters: [{name: podcast_id, type: string, required: true}]
      call: listennotes.get-podcast
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: podcast-ai-integration-capability-skills
    description: Skill for podcast AI.
    skills:
    - name: podcast-ai-integration-capability
      description: Podcast AI research.
      location: file:///opt/naftiko/skills/podcast-ai-integration-capability
      allowed-tools: search-podcasts,get-podcast
      tools:
      - {name: search-podcasts, from: {sourceNamespace: podcast-ai-integration-capability-mcp, action: search-podcasts}}
      - {name: get-podcast, from: {sourceNamespace: podcast-ai-integration-capability-mcp, action: get-podcast}}
