naftiko: 1.0.0-alpha2
info:
  title: Redshift Power Bi Pipeline Bridge Capability
  description: A bridge capability moving data from AWS Redshift to Power BI datasets via a managed pipeline.
  tags: [Naftiko, Redshift, Power BI]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: redshift-env
  keys: {REDSHIFT_HOST: REDSHIFT_HOST, REDSHIFT_TOKEN: REDSHIFT_TOKEN}
- namespace: powerbi-env
  keys: {POWERBI_TOKEN: POWERBI_TOKEN}
capability:
  consumes:
  - namespace: redshift
    type: http
    baseUri: https://{{REDSHIFT_HOST}}
    authentication: {type: bearer, token: '{{REDSHIFT_TOKEN}}'}
    resources:
    - {name: statements, path: /statements, operations: [{name: execute-statement, method: POST}]}
  - namespace: powerbi
    type: http
    baseUri: https://api.powerbi.com
    authentication: {type: bearer, token: '{{POWERBI_TOKEN}}'}
    resources:
    - {name: datasets, path: /v1.0/myorg/datasets, operations: [{name: list-datasets, method: GET}]}
    - name: dataset-rows
      path: /v1.0/myorg/datasets/{{dataset_id}}/tables/{{table}}/rows
      operations:
      - {name: push-rows, method: POST, inputParameters: [{name: dataset_id, in: path}, {name: table, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: redshift-power-bi-pipeline-bridge-capability-rest
    description: REST surface for the Redshift→Power BI pipeline.
    resources:
    - {name: pipeline, path: /pipeline/run, operations: [{method: POST, name: run-pipeline, call: redshift.execute-statement}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: redshift-power-bi-pipeline-bridge-capability-mcp
    description: MCP for the pipeline.
    tools:
    - {name: list-datasets, hints: {readOnly: true}, call: powerbi.list-datasets}
    - {name: run-pipeline, call: redshift.execute-statement}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: redshift-power-bi-pipeline-bridge-capability-skills
    description: Skill for the pipeline.
    skills:
    - name: redshift-power-bi-pipeline-bridge-capability
      description: Redshift→Power BI pipeline.
      location: file:///opt/naftiko/skills/redshift-power-bi-pipeline-bridge-capability
      allowed-tools: list-datasets,run-pipeline
      tools:
      - {name: list-datasets, from: {sourceNamespace: redshift-power-bi-pipeline-bridge-capability-mcp, action: list-datasets}}
      - {name: run-pipeline, from: {sourceNamespace: redshift-power-bi-pipeline-bridge-capability-mcp, action: run-pipeline}}
