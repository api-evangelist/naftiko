naftiko: 1.0.0-alpha2
info:
  title: Zero Touch Governance Tyk Companion
  description: A companion capability that wires zero-touch governance into Tyk gateway policies — gateway-level enforcement with Naftiko evaluations.
  tags: [Naftiko, Tyk, Governance, Zero-Touch]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: tyk-env
  keys: {TYK_HOST: TYK_HOST, TYK_TOKEN: TYK_TOKEN}
capability:
  consumes:
  - namespace: tyk
    type: http
    baseUri: https://{{TYK_HOST}}
    authentication: {type: bearer, token: '{{TYK_TOKEN}}'}
    resources:
    - {name: policies, path: /api/portal/policies, operations: [{name: list-policies, method: GET}, {name: create-policy, method: POST}]}
    - name: policy
      path: /api/portal/policies/{{policy_id}}
      operations:
      - {name: get-policy, method: GET, inputParameters: [{name: policy_id, in: path}]}
      - {name: update-policy, method: PUT, inputParameters: [{name: policy_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: zero-touch-governance-tyk-companion-rest
    description: REST surface for Tyk zero-touch.
    resources:
    - {name: policies, path: /policies, operations: [{method: GET, name: list-policies, call: tyk.list-policies}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: zero-touch-governance-tyk-companion-mcp
    description: MCP for Tyk zero-touch.
    tools:
    - {name: list-policies, hints: {readOnly: true}, call: tyk.list-policies}
    - {name: create-policy, call: tyk.create-policy}
    - name: update-policy
      inputParameters: [{name: policy_id, type: string, required: true}]
      call: tyk.update-policy
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: zero-touch-governance-tyk-companion-skills
    description: Skill for Tyk zero-touch.
    skills:
    - name: zero-touch-governance-tyk-companion
      description: Tyk zero-touch governance.
      location: file:///opt/naftiko/skills/zero-touch-governance-tyk-companion
      allowed-tools: list-policies,create-policy,update-policy
      tools:
      - {name: list-policies, from: {sourceNamespace: zero-touch-governance-tyk-companion-mcp, action: list-policies}}
      - {name: create-policy, from: {sourceNamespace: zero-touch-governance-tyk-companion-mcp, action: create-policy}}
      - {name: update-policy, from: {sourceNamespace: zero-touch-governance-tyk-companion-mcp, action: update-policy}}
