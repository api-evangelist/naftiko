naftiko: 1.0.0-alpha2
info:
  title: Schneider Playwright Mcp No Auth Onboarding Template
  description: Schneider Electric onboarding template for Playwright MCP — runs end-to-end browser flows against an unauthenticated demo target.
  tags: [Naftiko, Schneider, Playwright, MCP]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: playwright-env
  keys: {PLAYWRIGHT_HOST: PLAYWRIGHT_HOST}
capability:
  consumes:
  - namespace: playwright
    type: http
    baseUri: https://{{PLAYWRIGHT_HOST}}
    resources:
    - {name: sessions, path: /api/sessions, operations: [{name: create-session, method: POST}]}
    - name: session-actions
      path: /api/sessions/{{session_id}}/actions
      operations:
      - {name: send-action, method: POST, inputParameters: [{name: session_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-playwright-mcp-no-auth-onboarding-template-rest
    description: REST surface for Playwright MCP onboarding.
    resources:
    - {name: session, path: /sessions, operations: [{method: POST, name: create-session, call: playwright.create-session}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-playwright-mcp-no-auth-onboarding-template-mcp
    description: MCP for Playwright onboarding.
    tools:
    - {name: create-session, call: playwright.create-session}
    - name: send-action
      inputParameters: [{name: session_id, type: string, required: true}]
      call: playwright.send-action
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-playwright-mcp-no-auth-onboarding-template-skills
    description: Skill for Playwright onboarding.
    skills:
    - name: schneider-playwright-mcp-no-auth-onboarding-template
      description: Playwright MCP no-auth onboarding.
      location: file:///opt/naftiko/skills/schneider-playwright-mcp-no-auth-onboarding-template
      allowed-tools: create-session,send-action
      tools:
      - {name: create-session, from: {sourceNamespace: schneider-playwright-mcp-no-auth-onboarding-template-mcp, action: create-session}}
      - {name: send-action, from: {sourceNamespace: schneider-playwright-mcp-no-auth-onboarding-template-mcp, action: send-action}}
