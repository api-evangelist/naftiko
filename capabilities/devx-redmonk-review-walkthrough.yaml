naftiko: 1.0.0-alpha2
info:
  title: Devx Redmonk Review Walkthrough
  description: A walkthrough capability used to demo Naftiko DevX to RedMonk analysts — exposes a stripped-down, narratable surface.
  tags: [Naftiko, DevX, RedMonk]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: capabilities, path: /v1/capabilities, operations: [{name: list-capabilities, method: GET}]}
    - name: capability
      path: /v1/capabilities/{{capability_id}}
      operations:
      - {name: get-capability, method: GET, inputParameters: [{name: capability_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: devx-redmonk-review-walkthrough-rest
    description: REST surface for the analyst walkthrough.
    resources:
    - {name: capabilities, path: /capabilities, operations: [{method: GET, name: list-capabilities, call: naftiko-control.list-capabilities}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: devx-redmonk-review-walkthrough-mcp
    description: MCP for the walkthrough.
    tools:
    - {name: list-capabilities, hints: {readOnly: true}, call: naftiko-control.list-capabilities}
    - name: get-capability
      hints: {readOnly: true}
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-control.get-capability
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: devx-redmonk-review-walkthrough-skills
    description: Skill for the walkthrough.
    skills:
    - name: devx-redmonk-review-walkthrough
      description: RedMonk DevX walkthrough.
      location: file:///opt/naftiko/skills/devx-redmonk-review-walkthrough
      allowed-tools: list-capabilities,get-capability
      tools:
      - {name: list-capabilities, from: {sourceNamespace: devx-redmonk-review-walkthrough-mcp, action: list-capabilities}}
      - {name: get-capability, from: {sourceNamespace: devx-redmonk-review-walkthrough-mcp, action: get-capability}}
