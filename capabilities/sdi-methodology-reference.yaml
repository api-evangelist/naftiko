naftiko: 1.0.0-alpha2
info:
  title: Sdi Methodology Reference
  description: A methodology reference capability for Service Discovery Integration (SDI) wrapping the Naftiko SDI registry.
  tags: [Naftiko, SDI, Methodology]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-sdi
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: sdi-services, path: /v1/sdi/services, operations: [{name: list-sdi-services, method: GET}]}
    - name: sdi-service
      path: /v1/sdi/services/{{service_id}}
      operations:
      - {name: get-sdi-service, method: GET, inputParameters: [{name: service_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: sdi-methodology-reference-rest
    description: REST surface for SDI methodology.
    resources:
    - {name: services, path: /services, operations: [{method: GET, name: list-sdi-services, call: naftiko-sdi.list-sdi-services}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: sdi-methodology-reference-mcp
    description: MCP for SDI methodology.
    tools:
    - {name: list-sdi-services, hints: {readOnly: true}, call: naftiko-sdi.list-sdi-services}
    - name: get-sdi-service
      hints: {readOnly: true}
      inputParameters: [{name: service_id, type: string, required: true}]
      call: naftiko-sdi.get-sdi-service
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: sdi-methodology-reference-skills
    description: Skill for SDI methodology.
    skills:
    - name: sdi-methodology-reference
      description: SDI methodology reference.
      location: file:///opt/naftiko/skills/sdi-methodology-reference
      allowed-tools: list-sdi-services,get-sdi-service
      tools:
      - {name: list-sdi-services, from: {sourceNamespace: sdi-methodology-reference-mcp, action: list-sdi-services}}
      - {name: get-sdi-service, from: {sourceNamespace: sdi-methodology-reference-mcp, action: get-sdi-service}}
