naftiko: 1.0.0-alpha2
info:
  title: Rightsize Context Bundle
  description: A reusable bundle capability that right-sizes any verbose API response into a token-budgeted shape for AI agents.
  tags: [Naftiko, Rightsize, Bundle]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: target-env
  keys: {TARGET_HOST: TARGET_HOST, TARGET_TOKEN: TARGET_TOKEN}
capability:
  consumes:
  - namespace: target
    type: http
    baseUri: 'https://{{TARGET_HOST}}'
    authentication: {type: bearer, token: '{{TARGET_TOKEN}}'}
    resources:
    - name: resource
      path: '/api/v1/{{resource}}/{{id}}'
      operations:
      - {name: get-resource, method: GET, inputParameters: [{name: resource, in: path}, {name: id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: rightsize-context-bundle-rest
    description: REST surface for right-sized bundle.
    resources:
    - {name: rightsized, path: '/rightsized/{{resource}}/{{id}}', operations: [{method: GET, name: get-rightsized, inputParameters: [{name: resource, in: path, type: string}, {name: id, in: path, type: string}], call: target.get-resource}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: rightsize-context-bundle-mcp
    description: MCP for right-sized bundle.
    tools:
    - name: get-rightsized
      hints: {readOnly: true}
      inputParameters: [{name: resource, type: string, required: true}, {name: id, type: string, required: true}]
      call: target.get-resource
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: rightsize-context-bundle-skills
    description: Skill for right-sized bundle.
    skills:
    - name: rightsize-context-bundle
      description: Right-sized context bundle.
      location: file:///opt/naftiko/skills/rightsize-context-bundle
      allowed-tools: get-rightsized
      tools:
      - {name: get-rightsized, from: {sourceNamespace: rightsize-context-bundle-mcp, action: get-rightsized}}
