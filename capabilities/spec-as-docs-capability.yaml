naftiko: 1.0.0-alpha2
info:
  title: Spec As Docs Capability
  description: A capability that renders an OpenAPI spec as user-facing documentation served from the Naftiko docs API.
  tags: [Naftiko, OpenAPI, Docs]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-docs
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: specs, path: /v1/docs/specs, operations: [{name: list-spec-docs, method: GET}]}
    - name: spec-doc
      path: '/v1/docs/specs/{{spec_id}}'
      operations:
      - {name: get-spec-doc, method: GET, inputParameters: [{name: spec_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: spec-as-docs-capability-rest
    description: REST surface for spec-as-docs.
    resources:
    - {name: docs, path: '/docs/{{spec_id}}', operations: [{method: GET, name: get-spec-doc, inputParameters: [{name: spec_id, in: path, type: string}], call: naftiko-docs.get-spec-doc}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: spec-as-docs-capability-mcp
    description: MCP for spec-as-docs.
    tools:
    - {name: list-spec-docs, hints: {readOnly: true}, call: naftiko-docs.list-spec-docs}
    - name: get-spec-doc
      hints: {readOnly: true}
      inputParameters: [{name: spec_id, type: string, required: true}]
      call: naftiko-docs.get-spec-doc
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: spec-as-docs-capability-skills
    description: Skill for spec-as-docs.
    skills:
    - name: spec-as-docs-capability
      description: Spec-as-docs.
      location: file:///opt/naftiko/skills/spec-as-docs-capability
      allowed-tools: list-spec-docs,get-spec-doc
      tools:
      - {name: list-spec-docs, from: {sourceNamespace: spec-as-docs-capability-mcp, action: list-spec-docs}}
      - {name: get-spec-doc, from: {sourceNamespace: spec-as-docs-capability-mcp, action: get-spec-doc}}
