naftiko: 1.0.0-alpha2
info:
  title: Openehr Ehds Clinical Mcp Capability
  description: A clinical capability bridging openEHR archetypes to EHDS-compliant FHIR with MCP exposure for clinician AI flows.
  tags: [Naftiko, openEHR, EHDS, Clinical]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: openehr-env
  keys: {OPENEHR_HOST: OPENEHR_HOST, OPENEHR_TOKEN: OPENEHR_TOKEN}
capability:
  consumes:
  - namespace: openehr
    type: http
    baseUri: https://{{OPENEHR_HOST}}
    authentication: {type: bearer, token: '{{OPENEHR_TOKEN}}'}
    resources:
    - {name: ehrs, path: /rest/v1/ehr, operations: [{name: list-ehrs, method: GET}]}
    - name: ehr-compositions
      path: '/rest/v1/ehr/{{ehr_id}}/composition'
      operations:
      - {name: list-compositions, method: GET, inputParameters: [{name: ehr_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: openehr-ehds-clinical-mcp-capability-rest
    description: REST surface for openEHR→EHDS clinical context.
    resources:
    - {name: clinical-context, path: '/clinical-context/{{ehr_id}}', operations: [{method: GET, name: get-clinical-context, inputParameters: [{name: ehr_id, in: path, type: string}], call: openehr.list-compositions}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: openehr-ehds-clinical-mcp-capability-mcp
    description: MCP for openEHR→EHDS clinical context.
    tools:
    - name: get-clinical-context
      hints: {readOnly: true}
      inputParameters: [{name: ehr_id, type: string, required: true}]
      call: openehr.list-compositions
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: openehr-ehds-clinical-mcp-capability-skills
    description: Skill for clinical context.
    skills:
    - name: openehr-ehds-clinical-mcp-capability
      description: openEHR/EHDS clinical context.
      location: file:///opt/naftiko/skills/openehr-ehds-clinical-mcp-capability
      allowed-tools: get-clinical-context
      tools:
      - {name: get-clinical-context, from: {sourceNamespace: openehr-ehds-clinical-mcp-capability-mcp, action: get-clinical-context}}
