naftiko: 1.0.0-alpha2
info:
  title: Emsx Execution Governed Capability
  description: A governed capability over Bloomberg EMSX order-management — every order action passes through pre-trade controls and emits an audit event.
  tags: [Naftiko, Bloomberg, EMSX, Trading]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: bloomberg-env
  keys: {BLOOMBERG_TOKEN: BLOOMBERG_TOKEN}
capability:
  consumes:
  - namespace: emsx
    type: http
    baseUri: https://api.bloomberg.com
    authentication: {type: bearer, token: '{{BLOOMBERG_TOKEN}}'}
    resources:
    - {name: orders, path: /eap/emsx/v1/orders, operations: [{name: create-order, method: POST}, {name: list-orders, method: GET}]}
    - name: order
      path: /eap/emsx/v1/orders/{{order_id}}
      operations:
      - {name: get-order, method: GET, inputParameters: [{name: order_id, in: path}]}
      - {name: cancel-order, method: DELETE, inputParameters: [{name: order_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: emsx-execution-governed-capability-rest
    description: Governed EMSX execution surface.
    resources:
    - {name: orders, path: /orders, operations: [{method: POST, name: create-governed-order, call: emsx.create-order}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: emsx-execution-governed-capability-mcp
    description: MCP for governed EMSX.
    tools:
    - {name: list-orders, hints: {readOnly: true}, call: emsx.list-orders}
    - {name: create-governed-order, call: emsx.create-order}
    - name: cancel-order
      inputParameters: [{name: order_id, type: string, required: true}]
      call: emsx.cancel-order
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: emsx-execution-governed-capability-skills
    description: Skill for governed EMSX.
    skills:
    - name: emsx-execution-governed-capability
      description: Governed EMSX execution.
      location: file:///opt/naftiko/skills/emsx-execution-governed-capability
      allowed-tools: list-orders,create-governed-order,cancel-order
      tools:
      - {name: list-orders, from: {sourceNamespace: emsx-execution-governed-capability-mcp, action: list-orders}}
      - {name: create-governed-order, from: {sourceNamespace: emsx-execution-governed-capability-mcp, action: create-governed-order}}
      - {name: cancel-order, from: {sourceNamespace: emsx-execution-governed-capability-mcp, action: cancel-order}}
