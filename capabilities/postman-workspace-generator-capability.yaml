naftiko: 1.0.0-alpha2
info:
  title: Postman Workspace Generator Capability
  description: A capability that generates a Postman workspace from a Naftiko capability YAML — collections + environments auto-created.
  tags: [Naftiko, Postman, Workspace]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: postman-env
  keys: {POSTMAN_API_KEY: POSTMAN_API_KEY}
capability:
  consumes:
  - namespace: postman
    type: http
    baseUri: https://api.getpostman.com
    authentication: {type: bearer, token: '{{POSTMAN_API_KEY}}'}
    resources:
    - {name: workspaces, path: /workspaces, operations: [{name: list-workspaces, method: GET}, {name: create-workspace, method: POST}]}
    - {name: collections, path: /collections, operations: [{name: create-collection, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: postman-workspace-generator-capability-rest
    description: REST surface for Postman workspace generation.
    resources:
    - {name: generate, path: /generate, operations: [{method: POST, name: generate-workspace, call: postman.create-workspace}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: postman-workspace-generator-capability-mcp
    description: MCP for Postman workspace generation.
    tools:
    - {name: list-workspaces, hints: {readOnly: true}, call: postman.list-workspaces}
    - {name: generate-workspace, call: postman.create-workspace}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: postman-workspace-generator-capability-skills
    description: Skill for Postman workspace generation.
    skills:
    - name: postman-workspace-generator-capability
      description: Postman workspace generator.
      location: file:///opt/naftiko/skills/postman-workspace-generator-capability
      allowed-tools: list-workspaces,generate-workspace
      tools:
      - {name: list-workspaces, from: {sourceNamespace: postman-workspace-generator-capability-mcp, action: list-workspaces}}
      - {name: generate-workspace, from: {sourceNamespace: postman-workspace-generator-capability-mcp, action: generate-workspace}}
