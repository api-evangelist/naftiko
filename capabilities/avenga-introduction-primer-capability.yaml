naftiko: 1.0.0-alpha2
info:
  title: Avenga Introduction Primer Capability
  description: A primer capability used to onboard Avenga consultants to Naftiko — wraps a representative HR/People-Ops API as a capability.
  tags: [Naftiko, Avenga, Primer]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: bamboohr-env
  keys: {BAMBOOHR_SUBDOMAIN: BAMBOOHR_SUBDOMAIN, BAMBOOHR_TOKEN: BAMBOOHR_TOKEN}
capability:
  consumes:
  - namespace: bamboohr
    type: http
    baseUri: https://api.bamboohr.com
    authentication: {type: bearer, token: '{{BAMBOOHR_TOKEN}}'}
    resources:
    - {name: employees, path: '/api/gateway.php/{{BAMBOOHR_SUBDOMAIN}}/v1/employees/directory', operations: [{name: list-employees, method: GET}]}
    - name: employee
      path: '/api/gateway.php/{{BAMBOOHR_SUBDOMAIN}}/v1/employees/{{employee_id}}'
      operations:
      - {name: get-employee, method: GET, inputParameters: [{name: employee_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: avenga-introduction-primer-capability-rest
    description: REST surface for the Avenga primer.
    resources:
    - {name: employees, path: /employees, operations: [{method: GET, name: list-employees, call: bamboohr.list-employees}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: avenga-introduction-primer-capability-mcp
    description: MCP for the primer demo.
    tools:
    - {name: list-employees, hints: {readOnly: true}, call: bamboohr.list-employees}
    - name: get-employee
      hints: {readOnly: true}
      inputParameters: [{name: employee_id, type: string, required: true}]
      call: bamboohr.get-employee
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: avenga-introduction-primer-capability-skills
    description: Skill bundle for the primer.
    skills:
    - name: avenga-introduction-primer-capability
      description: Avenga onboarding primer.
      location: file:///opt/naftiko/skills/avenga-introduction-primer-capability
      allowed-tools: list-employees,get-employee
      tools:
      - {name: list-employees, from: {sourceNamespace: avenga-introduction-primer-capability-mcp, action: list-employees}}
      - {name: get-employee, from: {sourceNamespace: avenga-introduction-primer-capability-mcp, action: get-employee}}
