naftiko: 1.0.0-alpha2
info:
  title: Pii Governance Capability
  description: A governance capability that detects and redacts PII in API responses using a DLP service before it reaches the agent.
  tags: [Naftiko, PII, DLP, Governance]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: dlp-env
  keys: {DLP_TOKEN: DLP_TOKEN, GCP_PROJECT: GCP_PROJECT}
capability:
  consumes:
  - namespace: gcp-dlp
    type: http
    baseUri: https://dlp.googleapis.com
    authentication: {type: bearer, token: '{{DLP_TOKEN}}'}
    resources:
    - name: inspect
      path: /v2/projects/{{GCP_PROJECT}}/content:inspect
      operations: [{name: inspect-content, method: POST}]
    - name: deidentify
      path: /v2/projects/{{GCP_PROJECT}}/content:deidentify
      operations: [{name: deidentify-content, method: POST}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: pii-governance-capability-rest
    description: REST surface for PII redaction.
    resources:
    - {name: redact, path: /redact, operations: [{method: POST, name: redact-pii, call: gcp-dlp.deidentify-content}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: pii-governance-capability-mcp
    description: MCP for PII redaction.
    tools:
    - {name: inspect-content, call: gcp-dlp.inspect-content}
    - {name: redact-pii, call: gcp-dlp.deidentify-content}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: pii-governance-capability-skills
    description: Skill for PII governance.
    skills:
    - name: pii-governance-capability
      description: PII detection + redaction.
      location: file:///opt/naftiko/skills/pii-governance-capability
      allowed-tools: inspect-content,redact-pii
      tools:
      - {name: inspect-content, from: {sourceNamespace: pii-governance-capability-mcp, action: inspect-content}}
      - {name: redact-pii, from: {sourceNamespace: pii-governance-capability-mcp, action: redact-pii}}
