naftiko: 1.0.0-alpha2
info:
  title: Schneider Mcp Allow List Registry Capability
  description: Schneider Electric registry capability for the corporate-approved MCP allow-list — only listed MCP servers are reachable from agent runtimes.
  tags: [Naftiko, Schneider, MCP, Allow-List]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: allow-list, path: /v1/mcp-allow-list, operations: [{name: list-allowed-mcps, method: GET}, {name: add-to-allow-list, method: POST}]}
    - name: allow-list-entry
      path: /v1/mcp-allow-list/{{server_id}}
      operations:
      - {name: get-allow-list-entry, method: GET, inputParameters: [{name: server_id, in: path}]}
      - {name: remove-from-allow-list, method: DELETE, inputParameters: [{name: server_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-mcp-allow-list-registry-capability-rest
    description: REST surface for the MCP allow-list.
    resources:
    - {name: allow-list, path: /allow-list, operations: [{method: GET, name: list-allowed-mcps, call: naftiko-control.list-allowed-mcps}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-mcp-allow-list-registry-capability-mcp
    description: MCP for the MCP allow-list.
    tools:
    - {name: list-allowed-mcps, hints: {readOnly: true}, call: naftiko-control.list-allowed-mcps}
    - {name: add-to-allow-list, call: naftiko-control.add-to-allow-list}
    - name: remove-from-allow-list
      inputParameters: [{name: server_id, type: string, required: true}]
      call: naftiko-control.remove-from-allow-list
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-mcp-allow-list-registry-capability-skills
    description: Skill for the MCP allow-list.
    skills:
    - name: schneider-mcp-allow-list-registry-capability
      description: MCP allow-list registry.
      location: file:///opt/naftiko/skills/schneider-mcp-allow-list-registry-capability
      allowed-tools: list-allowed-mcps,add-to-allow-list,remove-from-allow-list
      tools:
      - {name: list-allowed-mcps, from: {sourceNamespace: schneider-mcp-allow-list-registry-capability-mcp, action: list-allowed-mcps}}
      - {name: add-to-allow-list, from: {sourceNamespace: schneider-mcp-allow-list-registry-capability-mcp, action: add-to-allow-list}}
      - {name: remove-from-allow-list, from: {sourceNamespace: schneider-mcp-allow-list-registry-capability-mcp, action: remove-from-allow-list}}
