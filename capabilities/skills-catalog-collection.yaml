naftiko: 1.0.0-alpha2
info:
  title: Skills Catalog Collection
  description: A collection capability listing all available Agent Skills in the Naftiko skills catalog.
  tags: [Naftiko, Skills, Catalog]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-skills
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: skills, path: /v1/skills, operations: [{name: list-skills, method: GET}]}
    - name: skill
      path: /v1/skills/{{skill_id}}
      operations:
      - {name: get-skill, method: GET, inputParameters: [{name: skill_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: skills-catalog-collection-rest
    description: REST surface for the skills catalog.
    resources:
    - {name: skills, path: /skills, operations: [{method: GET, name: list-skills, call: naftiko-skills.list-skills}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: skills-catalog-collection-mcp
    description: MCP for the skills catalog.
    tools:
    - {name: list-skills, hints: {readOnly: true}, call: naftiko-skills.list-skills}
    - name: get-skill
      hints: {readOnly: true}
      inputParameters: [{name: skill_id, type: string, required: true}]
      call: naftiko-skills.get-skill
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: skills-catalog-collection-skills
    description: Skill for the skills catalog.
    skills:
    - name: skills-catalog-collection
      description: Skills catalog collection.
      location: file:///opt/naftiko/skills/skills-catalog-collection
      allowed-tools: list-skills,get-skill
      tools:
      - {name: list-skills, from: {sourceNamespace: skills-catalog-collection-mcp, action: list-skills}}
      - {name: get-skill, from: {sourceNamespace: skills-catalog-collection-mcp, action: get-skill}}
