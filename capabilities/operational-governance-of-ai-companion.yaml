naftiko: 1.0.0-alpha2
info:
  title: Operational Governance Of Ai Companion
  description: An operational-governance capability over an AI companion (Copilot/Claude) — captures every tool call into the Naftiko governance ledger.
  tags: [Naftiko, Governance, AI Companion]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: governance-ledger, path: /v1/governance/ledger, operations: [{name: append-ledger-event, method: POST}, {name: list-ledger-events, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: operational-governance-of-ai-companion-rest
    description: REST surface for AI companion governance.
    resources:
    - {name: ledger, path: /ledger, operations: [{method: POST, name: append-ledger-event, call: naftiko-control.append-ledger-event}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: operational-governance-of-ai-companion-mcp
    description: MCP for AI companion governance.
    tools:
    - {name: append-ledger-event, call: naftiko-control.append-ledger-event}
    - {name: list-ledger-events, hints: {readOnly: true}, call: naftiko-control.list-ledger-events}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: operational-governance-of-ai-companion-skills
    description: Skill for AI companion governance.
    skills:
    - name: operational-governance-of-ai-companion
      description: Operational governance of AI companions.
      location: file:///opt/naftiko/skills/operational-governance-of-ai-companion
      allowed-tools: append-ledger-event,list-ledger-events
      tools:
      - {name: append-ledger-event, from: {sourceNamespace: operational-governance-of-ai-companion-mcp, action: append-ledger-event}}
      - {name: list-ledger-events, from: {sourceNamespace: operational-governance-of-ai-companion-mcp, action: list-ledger-events}}
