naftiko: 1.0.0-alpha2
info:
  title: Overlays Governance Rule Merger Capability
  description: A capability that merges OpenAPI Overlays with governance rules into a single combined ruleset for Spectral lint.
  tags: [Naftiko, OpenAPI Overlays, Governance]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: stoplight-env
  keys: {STOPLIGHT_TOKEN: STOPLIGHT_TOKEN}
capability:
  consumes:
  - namespace: stoplight
    type: http
    baseUri: https://api.stoplight.io
    authentication: {type: bearer, token: '{{STOPLIGHT_TOKEN}}'}
    resources:
    - {name: rulesets, path: /v1/rulesets, operations: [{name: list-rulesets, method: GET}]}
    - {name: lint, path: '/v1/projects/{{project_id}}/lint', operations: [{name: lint-with-merged-ruleset, method: POST, inputParameters: [{name: project_id, in: path}]}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: overlays-governance-rule-merger-capability-rest
    description: REST surface for overlay+rule merger.
    resources:
    - {name: lint, path: /lint, operations: [{method: POST, name: lint-with-merged-ruleset, call: stoplight.lint-with-merged-ruleset}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: overlays-governance-rule-merger-capability-mcp
    description: MCP for overlay+rule merger.
    tools:
    - {name: list-rulesets, hints: {readOnly: true}, call: stoplight.list-rulesets}
    - {name: lint-with-merged-ruleset, call: stoplight.lint-with-merged-ruleset}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: overlays-governance-rule-merger-capability-skills
    description: Skill for rule merger.
    skills:
    - name: overlays-governance-rule-merger-capability
      description: Overlays + governance rule merger.
      location: file:///opt/naftiko/skills/overlays-governance-rule-merger-capability
      allowed-tools: list-rulesets,lint-with-merged-ruleset
      tools:
      - {name: list-rulesets, from: {sourceNamespace: overlays-governance-rule-merger-capability-mcp, action: list-rulesets}}
      - {name: lint-with-merged-ruleset, from: {sourceNamespace: overlays-governance-rule-merger-capability-mcp, action: lint-with-merged-ruleset}}
