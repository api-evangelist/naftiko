naftiko: 1.0.0-alpha2
info:
  title: Zero Touch Governance Runtime Capability
  description: A runtime capability that applies governance policies at call time with zero developer involvement — pure Naftiko proxy enforcement.
  tags: [Naftiko, Governance, Runtime, Zero-Touch]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: policy-evaluations, path: /v1/policy/evaluations, operations: [{name: evaluate-policy, method: POST}]}
    - {name: policies, path: /v1/policies, operations: [{name: list-policies, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: zero-touch-governance-runtime-capability-rest
    description: REST surface for zero-touch governance.
    resources:
    - {name: evaluate, path: /evaluate, operations: [{method: POST, name: evaluate-policy, call: naftiko-control.evaluate-policy}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: zero-touch-governance-runtime-capability-mcp
    description: MCP for zero-touch governance.
    tools:
    - {name: evaluate-policy, call: naftiko-control.evaluate-policy}
    - {name: list-policies, hints: {readOnly: true}, call: naftiko-control.list-policies}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: zero-touch-governance-runtime-capability-skills
    description: Skill for zero-touch governance.
    skills:
    - name: zero-touch-governance-runtime-capability
      description: Zero-touch governance runtime.
      location: file:///opt/naftiko/skills/zero-touch-governance-runtime-capability
      allowed-tools: evaluate-policy,list-policies
      tools:
      - {name: evaluate-policy, from: {sourceNamespace: zero-touch-governance-runtime-capability-mcp, action: evaluate-policy}}
      - {name: list-policies, from: {sourceNamespace: zero-touch-governance-runtime-capability-mcp, action: list-policies}}
