naftiko: 1.0.0-alpha2
info:
  title: Nwm Bloomberg Aim Portfolio Position Agent Skill
  description: A Northwestern Mutual Agent Skill over Bloomberg AIM portfolio positions for advisor-facing AI flows.
  tags: [Naftiko, NWM, Bloomberg AIM, Agent Skill]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: bloomberg-env
  keys: {BLOOMBERG_TOKEN: BLOOMBERG_TOKEN}
capability:
  consumes:
  - namespace: aim
    type: http
    baseUri: https://api.bloomberg.com
    authentication: {type: bearer, token: '{{BLOOMBERG_TOKEN}}'}
    resources:
    - name: positions
      path: '/eap/aim/v1/portfolios/{{portfolio_id}}/positions'
      operations:
      - {name: list-positions, method: GET, inputParameters: [{name: portfolio_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: nwm-bloomberg-aim-portfolio-position-agent-skill-rest
    description: REST surface for advisor portfolio positions.
    resources:
    - {name: positions, path: '/portfolios/{{portfolio_id}}/positions', operations: [{method: GET, name: list-positions, inputParameters: [{name: portfolio_id, in: path, type: string}], call: aim.list-positions}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: nwm-bloomberg-aim-portfolio-position-agent-skill-mcp
    description: MCP for advisor portfolio positions.
    tools:
    - name: list-positions
      hints: {readOnly: true}
      inputParameters: [{name: portfolio_id, type: string, required: true}]
      call: aim.list-positions
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: nwm-bloomberg-aim-portfolio-position-agent-skill-skills
    description: Agent Skill for advisor portfolio positions.
    skills:
    - name: nwm-bloomberg-aim-portfolio-position-agent-skill
      description: Advisor-facing AIM portfolio positions.
      location: file:///opt/naftiko/skills/nwm-bloomberg-aim-portfolio-position-agent-skill
      allowed-tools: list-positions
      tools:
      - {name: list-positions, from: {sourceNamespace: nwm-bloomberg-aim-portfolio-position-agent-skill-mcp, action: list-positions}}
