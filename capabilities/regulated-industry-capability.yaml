naftiko: 1.0.0-alpha2
info:
  title: Regulated Industry Capability
  description: A regulated-industry capability template that wraps any underlying API in audit + retention + DLP gates.
  tags: [Naftiko, Regulated, Compliance]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: target-env
  keys: {TARGET_HOST: TARGET_HOST, TARGET_TOKEN: TARGET_TOKEN}
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: target
    type: http
    baseUri: https://{{TARGET_HOST}}
    authentication: {type: bearer, token: '{{TARGET_TOKEN}}'}
    resources:
    - name: resource
      path: /api/v1/{{resource}}/{{id}}
      operations:
      - {name: get-resource, method: GET, inputParameters: [{name: resource, in: path}, {name: id, in: path}]}
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: audit-events, path: /v1/audit/events, operations: [{name: emit-audit, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: regulated-industry-capability-rest
    description: Regulated REST surface with audit gating.
    resources:
    - name: resource
      path: /resources/{{resource}}/{{id}}
      operations:
      - {method: GET, name: get-governed-resource, inputParameters: [{name: resource, in: path, type: string}, {name: id, in: path, type: string}], call: target.get-resource}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: regulated-industry-capability-mcp
    description: MCP for regulated access.
    tools:
    - name: get-governed-resource
      hints: {readOnly: true}
      inputParameters: [{name: resource, type: string, required: true}, {name: id, type: string, required: true}]
      call: target.get-resource
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: regulated-industry-capability-skills
    description: Skill for regulated access.
    skills:
    - name: regulated-industry-capability
      description: Regulated-industry access.
      location: file:///opt/naftiko/skills/regulated-industry-capability
      allowed-tools: get-governed-resource
      tools:
      - {name: get-governed-resource, from: {sourceNamespace: regulated-industry-capability-mcp, action: get-governed-resource}}
