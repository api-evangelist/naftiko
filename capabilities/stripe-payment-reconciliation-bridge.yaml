naftiko: 1.0.0-alpha2
info:
  title: Stripe Payment Reconciliation Bridge
  description: A Naftiko capability over the Stripe API for payments, reconciliation, and tax flows.
  tags: [Naftiko, Stripe, Payments]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: stripe-env
  keys: {STRIPE_API_KEY: STRIPE_API_KEY}
capability:
  consumes:
  - namespace: stripe
    type: http
    baseUri: https://api.stripe.com
    authentication: {type: bearer, token: '{{STRIPE_API_KEY}}'}
    resources:
    - {name: charges, path: /v1/charges, operations: [{name: list-charges, method: GET}]}
    - name: charge
      path: /v1/charges/{{id}}
      operations:
      - {name: get-charge, method: GET, inputParameters: [{name: id, in: path}]}
    - {name: payouts, path: /v1/payouts, operations: [{name: list-payouts, method: GET}]}
    - {name: tax-calculations, path: /v1/tax/calculations, operations: [{name: create-tax-calculation, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: stripe-payment-reconciliation-bridge-rest
    description: REST surface for Stripe.
    resources:
    - {name: charges, path: /charges, operations: [{method: GET, name: list-charges, call: stripe.list-charges}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: stripe-payment-reconciliation-bridge-mcp
    description: MCP for Stripe.
    tools:
    - {name: list-charges, hints: {readOnly: true}, call: stripe.list-charges}
    - name: get-charge
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: stripe.get-charge
    - {name: list-payouts, hints: {readOnly: true}, call: stripe.list-payouts}
    - {name: create-tax-calculation, call: stripe.create-tax-calculation}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: stripe-payment-reconciliation-bridge-skills
    description: Skill for Stripe.
    skills:
    - name: stripe-payment-reconciliation-bridge
      description: Stripe capability.
      location: file:///opt/naftiko/skills/stripe-payment-reconciliation-bridge
      allowed-tools: list-charges,get-charge,list-payouts,create-tax-calculation
      tools:
      - {name: list-charges, from: {sourceNamespace: stripe-payment-reconciliation-bridge-mcp, action: list-charges}}
      - {name: get-charge, from: {sourceNamespace: stripe-payment-reconciliation-bridge-mcp, action: get-charge}}
      - {name: list-payouts, from: {sourceNamespace: stripe-payment-reconciliation-bridge-mcp, action: list-payouts}}
      - {name: create-tax-calculation, from: {sourceNamespace: stripe-payment-reconciliation-bridge-mcp, action: create-tax-calculation}}
