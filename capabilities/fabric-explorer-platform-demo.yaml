naftiko: 1.0.0-alpha2
info:
  title: Fabric Explorer Platform Demo
  description: A demo capability over Microsoft Fabric exposing the platform explorer (workspaces, items, lakehouses) as a Naftiko capability.
  tags: [Naftiko, Microsoft Fabric, Demo]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: fabric-env
  keys: {FABRIC_TOKEN: FABRIC_TOKEN}
capability:
  consumes:
  - namespace: fabric
    type: http
    baseUri: https://api.fabric.microsoft.com
    authentication: {type: bearer, token: '{{FABRIC_TOKEN}}'}
    resources:
    - {name: workspaces, path: /v1/workspaces, operations: [{name: list-workspaces, method: GET}]}
    - name: workspace-items
      path: /v1/workspaces/{{workspace_id}}/items
      operations:
      - {name: list-workspace-items, method: GET, inputParameters: [{name: workspace_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: fabric-explorer-platform-demo-rest
    description: REST surface for Fabric platform explorer.
    resources:
    - {name: workspaces, path: /workspaces, operations: [{method: GET, name: list-workspaces, call: fabric.list-workspaces}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: fabric-explorer-platform-demo-mcp
    description: MCP for Fabric explorer.
    tools:
    - {name: list-workspaces, hints: {readOnly: true}, call: fabric.list-workspaces}
    - name: list-workspace-items
      hints: {readOnly: true}
      inputParameters: [{name: workspace_id, type: string, required: true}]
      call: fabric.list-workspace-items
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: fabric-explorer-platform-demo-skills
    description: Skill for Fabric explorer.
    skills:
    - name: fabric-explorer-platform-demo
      description: Microsoft Fabric platform explorer demo.
      location: file:///opt/naftiko/skills/fabric-explorer-platform-demo
      allowed-tools: list-workspaces,list-workspace-items
      tools:
      - {name: list-workspaces, from: {sourceNamespace: fabric-explorer-platform-demo-mcp, action: list-workspaces}}
      - {name: list-workspace-items, from: {sourceNamespace: fabric-explorer-platform-demo-mcp, action: list-workspace-items}}
