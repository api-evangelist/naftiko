naftiko: 1.0.0-alpha2
info:
  title: Servicenow Incident To Backstage Runbook
  description: A capability that surfaces ServiceNow incidents as Backstage runbook entities so on-call engineers see them in the developer portal.
  tags: [Naftiko, ServiceNow, Backstage, Runbook]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: servicenow-env
  keys: {SN_HOST: SN_HOST, SN_USER: SN_USER, SN_PASSWORD: SN_PASSWORD}
- namespace: backstage-env
  keys: {BACKSTAGE_HOST: BACKSTAGE_HOST, BACKSTAGE_TOKEN: BACKSTAGE_TOKEN}
capability:
  consumes:
  - namespace: servicenow
    type: http
    baseUri: https://{{SN_HOST}}
    authentication: {type: basic, username: '{{SN_USER}}', password: '{{SN_PASSWORD}}'}
    resources:
    - {name: incidents, path: /api/now/table/incident, operations: [{name: list-incidents, method: GET}]}
  - namespace: backstage
    type: http
    baseUri: https://{{BACKSTAGE_HOST}}
    authentication: {type: bearer, token: '{{BACKSTAGE_TOKEN}}'}
    resources:
    - {name: catalog-entities, path: /api/catalog/entities, operations: [{name: upsert-entity, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: servicenow-incident-to-backstage-runbook-rest
    description: REST surface for incident-to-runbook sync.
    resources:
    - {name: sync, path: /sync, operations: [{method: POST, name: sync-incidents, call: servicenow.list-incidents}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: servicenow-incident-to-backstage-runbook-mcp
    description: MCP for incident-to-runbook sync.
    tools:
    - {name: list-incidents, hints: {readOnly: true}, call: servicenow.list-incidents}
    - {name: sync-incidents, call: servicenow.list-incidents}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: servicenow-incident-to-backstage-runbook-skills
    description: Skill for incident-to-runbook.
    skills:
    - name: servicenow-incident-to-backstage-runbook
      description: ServiceNow incident → Backstage runbook.
      location: file:///opt/naftiko/skills/servicenow-incident-to-backstage-runbook
      allowed-tools: list-incidents,sync-incidents
      tools:
      - {name: list-incidents, from: {sourceNamespace: servicenow-incident-to-backstage-runbook-mcp, action: list-incidents}}
      - {name: sync-incidents, from: {sourceNamespace: servicenow-incident-to-backstage-runbook-mcp, action: sync-incidents}}
