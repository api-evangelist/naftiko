naftiko: 1.0.0-alpha2
info:
  title: Salesforce Service Cloud Dealer Context
  description: A capability over Salesforce Service Cloud composing dealer cases + accounts into a unified support context.
  tags: [Naftiko, Salesforce, Service Cloud]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: salesforce-env
  keys: {SF_HOST: SF_HOST, SF_TOKEN: SF_TOKEN}
capability:
  consumes:
  - namespace: salesforce
    type: http
    baseUri: https://{{SF_HOST}}
    authentication: {type: bearer, token: '{{SF_TOKEN}}'}
    resources:
    - name: case
      path: '/services/data/v60.0/sobjects/Case/{{id}}'
      operations:
      - {name: get-case, method: GET, inputParameters: [{name: id, in: path}]}
    - {name: query, path: /services/data/v60.0/query, operations: [{name: query-soql, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: salesforce-service-cloud-dealer-context-rest
    description: REST surface for dealer service context.
    resources:
    - {name: dealer-context, path: '/dealers/{{id}}/context', operations: [{method: GET, name: get-dealer-context, inputParameters: [{name: id, in: path, type: string}], call: salesforce.get-case}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: salesforce-service-cloud-dealer-context-mcp
    description: MCP for dealer service context.
    tools:
    - name: get-dealer-context
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: salesforce.get-case
    - {name: query-soql, hints: {readOnly: true}, call: salesforce.query-soql}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: salesforce-service-cloud-dealer-context-skills
    description: Skill for dealer context.
    skills:
    - name: salesforce-service-cloud-dealer-context
      description: Service Cloud dealer context.
      location: file:///opt/naftiko/skills/salesforce-service-cloud-dealer-context
      allowed-tools: get-dealer-context,query-soql
      tools:
      - {name: get-dealer-context, from: {sourceNamespace: salesforce-service-cloud-dealer-context-mcp, action: get-dealer-context}}
      - {name: query-soql, from: {sourceNamespace: salesforce-service-cloud-dealer-context-mcp, action: query-soql}}
