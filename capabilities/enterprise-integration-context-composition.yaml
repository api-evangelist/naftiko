naftiko: 1.0.0-alpha2
info:
  title: Enterprise Integration Context Composition
  description: A capability composing ESB / iPaaS endpoints (MuleSoft, Boomi) into a unified integration context for enterprise agents.
  tags: [Naftiko, MuleSoft, Boomi, Integration]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: mulesoft-env
  keys: {MULESOFT_TOKEN: MULESOFT_TOKEN}
capability:
  consumes:
  - namespace: mulesoft
    type: http
    baseUri: https://anypoint.mulesoft.com
    authentication: {type: bearer, token: '{{MULESOFT_TOKEN}}'}
    resources:
    - {name: applications, path: /cloudhub/api/v2/applications, operations: [{name: list-applications, method: GET}]}
    - name: application
      path: /cloudhub/api/v2/applications/{{domain}}
      operations:
      - {name: get-application, method: GET, inputParameters: [{name: domain, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: enterprise-integration-context-composition-rest
    description: REST surface for integration context.
    resources:
    - {name: integrations, path: /integrations, operations: [{method: GET, name: list-integrations, call: mulesoft.list-applications}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: enterprise-integration-context-composition-mcp
    description: MCP for integration context.
    tools:
    - {name: list-integrations, hints: {readOnly: true}, call: mulesoft.list-applications}
    - name: get-integration
      hints: {readOnly: true}
      inputParameters: [{name: domain, type: string, required: true}]
      call: mulesoft.get-application
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: enterprise-integration-context-composition-skills
    description: Skill for enterprise integration context.
    skills:
    - name: enterprise-integration-context-composition
      description: Enterprise integration context.
      location: file:///opt/naftiko/skills/enterprise-integration-context-composition
      allowed-tools: list-integrations,get-integration
      tools:
      - {name: list-integrations, from: {sourceNamespace: enterprise-integration-context-composition-mcp, action: list-integrations}}
      - {name: get-integration, from: {sourceNamespace: enterprise-integration-context-composition-mcp, action: get-integration}}
