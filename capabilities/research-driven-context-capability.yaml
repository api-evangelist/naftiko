naftiko: 1.0.0-alpha2
info:
  title: Research Driven Context Capability
  description: A capability that pulls research signals (academic search, news, internal RAG) into a unified research-driven context for agents.
  tags: [Naftiko, Research, Context, RAG]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: arxiv-env
  keys: {}
capability:
  consumes:
  - namespace: arxiv
    type: http
    baseUri: https://export.arxiv.org
    resources:
    - {name: search, path: /api/query, operations: [{name: search-arxiv, method: GET, inputParameters: [{name: search_query, in: query}]}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: research-driven-context-capability-rest
    description: REST surface for research context.
    resources:
    - {name: research, path: /research, operations: [{method: GET, name: get-research-context, call: arxiv.search-arxiv}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: research-driven-context-capability-mcp
    description: MCP for research context.
    tools:
    - {name: search-arxiv, hints: {readOnly: true}, call: arxiv.search-arxiv}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: research-driven-context-capability-skills
    description: Skill for research context.
    skills:
    - name: research-driven-context-capability
      description: Research-driven context.
      location: file:///opt/naftiko/skills/research-driven-context-capability
      allowed-tools: search-arxiv
      tools:
      - {name: search-arxiv, from: {sourceNamespace: research-driven-context-capability-mcp, action: search-arxiv}}
