naftiko: 1.0.0-alpha2
info:
  title: Spec Rules Wiki Companion Capability
  description: A spec-driven companion capability over the Naftiko spec/rules registry for SDK and integration generation.
  tags: [Naftiko, Spec-Driven, OpenAPI]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: speakeasy-env
  keys: {SPEAKEASY_API_KEY: SPEAKEASY_API_KEY}
capability:
  consumes:
  - namespace: speakeasy
    type: http
    baseUri: https://api.speakeasy.com
    authentication: {type: bearer, token: '{{SPEAKEASY_API_KEY}}'}
    resources:
    - {name: workspaces, path: /v1/workspaces, operations: [{name: list-workspaces, method: GET}]}
    - {name: generate, path: '/v1/workspaces/{{workspace_id}}/generate', operations: [{name: generate, method: POST, inputParameters: [{name: workspace_id, in: path}]}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: spec-rules-wiki-companion-capability-rest
    description: REST surface for spec-driven companion.
    resources:
    - {name: generate, path: '/generate/{{workspace_id}}', operations: [{method: POST, name: generate, inputParameters: [{name: workspace_id, in: path, type: string}], call: speakeasy.generate}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: spec-rules-wiki-companion-capability-mcp
    description: MCP for spec-driven companion.
    tools:
    - {name: list-workspaces, hints: {readOnly: true}, call: speakeasy.list-workspaces}
    - name: generate
      inputParameters: [{name: workspace_id, type: string, required: true}]
      call: speakeasy.generate
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: spec-rules-wiki-companion-capability-skills
    description: Skill for spec-driven companion.
    skills:
    - name: spec-rules-wiki-companion-capability
      description: Spec-driven companion.
      location: file:///opt/naftiko/skills/spec-rules-wiki-companion-capability
      allowed-tools: list-workspaces,generate
      tools:
      - {name: list-workspaces, from: {sourceNamespace: spec-rules-wiki-companion-capability-mcp, action: list-workspaces}}
      - {name: generate, from: {sourceNamespace: spec-rules-wiki-companion-capability-mcp, action: generate}}
