naftiko: 1.0.0-alpha2
info:
  title: Work Iq Context Layer Mcp
  description: A capability over Microsoft Graph Work IQ exposing semantic work context (people, files, meetings) as MCP tools.
  tags: [Naftiko, Microsoft Graph, Work IQ]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: msgraph-env
  keys: {MSGRAPH_TOKEN: MSGRAPH_TOKEN}
capability:
  consumes:
  - namespace: msgraph
    type: http
    baseUri: https://graph.microsoft.com
    authentication: {type: bearer, token: '{{MSGRAPH_TOKEN}}'}
    resources:
    - {name: insights-trending, path: /v1.0/me/insights/trending, operations: [{name: get-trending, method: GET}]}
    - {name: insights-shared, path: /v1.0/me/insights/shared, operations: [{name: get-shared, method: GET}]}
    - {name: insights-used, path: /v1.0/me/insights/used, operations: [{name: get-used, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: work-iq-context-layer-mcp-rest
    description: REST surface for Work IQ context.
    resources:
    - {name: trending, path: /trending, operations: [{method: GET, name: get-trending, call: msgraph.get-trending}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: work-iq-context-layer-mcp-mcp
    description: MCP for Work IQ context.
    tools:
    - {name: get-trending, hints: {readOnly: true}, call: msgraph.get-trending}
    - {name: get-shared, hints: {readOnly: true}, call: msgraph.get-shared}
    - {name: get-used, hints: {readOnly: true}, call: msgraph.get-used}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: work-iq-context-layer-mcp-skills
    description: Skill for Work IQ context.
    skills:
    - name: work-iq-context-layer-mcp
      description: Work IQ context layer.
      location: file:///opt/naftiko/skills/work-iq-context-layer-mcp
      allowed-tools: get-trending,get-shared,get-used
      tools:
      - {name: get-trending, from: {sourceNamespace: work-iq-context-layer-mcp-mcp, action: get-trending}}
      - {name: get-shared, from: {sourceNamespace: work-iq-context-layer-mcp-mcp, action: get-shared}}
      - {name: get-used, from: {sourceNamespace: work-iq-context-layer-mcp-mcp, action: get-used}}
