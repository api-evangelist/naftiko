naftiko: 1.0.0-alpha2
info:
  title: Compose Ai Context Finance Capability
  description: A capability composing finance APIs (market data, portfolio, risk) into a token-budgeted AI context for finance agents.
  tags: [Naftiko, Finance, AI Context]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: bloomberg-env
  keys: {BLOOMBERG_TOKEN: BLOOMBERG_TOKEN}
capability:
  consumes:
  - namespace: bloomberg
    type: http
    baseUri: https://api.bloomberg.com
    authentication: {type: bearer, token: '{{BLOOMBERG_TOKEN}}'}
    resources:
    - {name: bql, path: /eap/bql/v1/query, operations: [{name: run-bql, method: POST}]}
    - name: market-data
      path: '/eap/marketdata/v1/securities/{{security_id}}/quote'
      operations:
      - {name: get-quote, method: GET, inputParameters: [{name: security_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: compose-ai-context-finance-capability-rest
    description: REST surface for composed finance AI context.
    resources:
    - {name: ai-context, path: '/finance-ai-context/{{security_id}}', operations: [{method: GET, name: get-finance-ai-context, inputParameters: [{name: security_id, in: path, type: string}], call: bloomberg.get-quote}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: compose-ai-context-finance-capability-mcp
    description: MCP for finance AI context.
    tools:
    - name: get-finance-ai-context
      hints: {readOnly: true}
      inputParameters: [{name: security_id, type: string, required: true}]
      call: bloomberg.get-quote
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: compose-ai-context-finance-capability-skills
    description: Skill for finance AI context.
    skills:
    - name: compose-ai-context-finance-capability
      description: Composed finance AI context.
      location: file:///opt/naftiko/skills/compose-ai-context-finance-capability
      allowed-tools: get-finance-ai-context
      tools:
      - {name: get-finance-ai-context, from: {sourceNamespace: compose-ai-context-finance-capability-mcp, action: get-finance-ai-context}}
