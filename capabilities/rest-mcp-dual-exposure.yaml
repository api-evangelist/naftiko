naftiko: 1.0.0-alpha2
info:
  title: Rest Mcp Dual Exposure
  description: A reference capability illustrating REST + MCP dual exposure of the same underlying API operations.
  tags: [Naftiko, REST, MCP, Dual Exposure]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: target-env
  keys: {TARGET_HOST: TARGET_HOST, TARGET_TOKEN: TARGET_TOKEN}
capability:
  consumes:
  - namespace: target
    type: http
    baseUri: https://{{TARGET_HOST}}
    authentication: {type: bearer, token: '{{TARGET_TOKEN}}'}
    resources:
    - {name: items, path: /api/v1/items, operations: [{name: list-items, method: GET}]}
    - name: item
      path: /api/v1/items/{{id}}
      operations:
      - {name: get-item, method: GET, inputParameters: [{name: id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: rest-mcp-dual-exposure-rest
    description: REST surface for dual-exposure reference.
    resources:
    - {name: items, path: /items, operations: [{method: GET, name: list-items, call: target.list-items}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: rest-mcp-dual-exposure-mcp
    description: MCP for dual-exposure reference.
    tools:
    - {name: list-items, hints: {readOnly: true}, call: target.list-items}
    - name: get-item
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: target.get-item
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: rest-mcp-dual-exposure-skills
    description: Skill for dual-exposure reference.
    skills:
    - name: rest-mcp-dual-exposure
      description: REST + MCP dual exposure.
      location: file:///opt/naftiko/skills/rest-mcp-dual-exposure
      allowed-tools: list-items,get-item
      tools:
      - {name: list-items, from: {sourceNamespace: rest-mcp-dual-exposure-mcp, action: list-items}}
      - {name: get-item, from: {sourceNamespace: rest-mcp-dual-exposure-mcp, action: get-item}}
