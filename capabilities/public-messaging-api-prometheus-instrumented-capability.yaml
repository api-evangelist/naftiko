naftiko: 1.0.0-alpha2
info:
  title: Public Messaging Api Prometheus Instrumented Capability
  description: A capability wrapping a public messaging API with Prometheus metrics scraping for usage observability.
  tags: [Naftiko, Twilio, Prometheus]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: twilio-env
  keys: {TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN}
- namespace: prometheus-env
  keys: {PROMETHEUS_HOST: PROMETHEUS_HOST}
capability:
  consumes:
  - namespace: twilio
    type: http
    baseUri: https://api.twilio.com
    authentication: {type: basic, username: '{{TWILIO_ACCOUNT_SID}}', password: '{{TWILIO_AUTH_TOKEN}}'}
    resources:
    - {name: messages, path: '/2010-04-01/Accounts/{{TWILIO_ACCOUNT_SID}}/Messages.json', operations: [{name: send-sms, method: POST}]}
  - namespace: prometheus
    type: http
    baseUri: https://{{PROMETHEUS_HOST}}
    resources:
    - {name: query, path: /api/v1/query, operations: [{name: query-prometheus, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: public-messaging-api-prometheus-instrumented-capability-rest
    description: REST surface for instrumented messaging.
    resources:
    - {name: send, path: /send, operations: [{method: POST, name: send-sms, call: twilio.send-sms}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: public-messaging-api-prometheus-instrumented-capability-mcp
    description: MCP for instrumented messaging.
    tools:
    - {name: send-sms, call: twilio.send-sms}
    - {name: query-metrics, hints: {readOnly: true}, call: prometheus.query-prometheus}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: public-messaging-api-prometheus-instrumented-capability-skills
    description: Skill for instrumented messaging.
    skills:
    - name: public-messaging-api-prometheus-instrumented-capability
      description: Instrumented messaging.
      location: file:///opt/naftiko/skills/public-messaging-api-prometheus-instrumented-capability
      allowed-tools: send-sms,query-metrics
      tools:
      - {name: send-sms, from: {sourceNamespace: public-messaging-api-prometheus-instrumented-capability-mcp, action: send-sms}}
      - {name: query-metrics, from: {sourceNamespace: public-messaging-api-prometheus-instrumented-capability-mcp, action: query-metrics}}
