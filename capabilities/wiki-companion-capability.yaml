naftiko: 1.0.0-alpha2
info:
  title: Wiki Companion Capability
  description: A capability over a wiki (Confluence / GitHub Wiki) for AI-driven knowledge retrieval inside agent flows.
  tags: [Naftiko, Wiki, Confluence]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: confluence-env
  keys: {CONFLUENCE_HOST: CONFLUENCE_HOST, CONFLUENCE_USER: CONFLUENCE_USER, CONFLUENCE_TOKEN: CONFLUENCE_TOKEN}
capability:
  consumes:
  - namespace: confluence
    type: http
    baseUri: https://{{CONFLUENCE_HOST}}
    authentication: {type: basic, username: '{{CONFLUENCE_USER}}', password: '{{CONFLUENCE_TOKEN}}'}
    resources:
    - {name: search, path: /wiki/rest/api/search, operations: [{name: search-wiki, method: GET}]}
    - name: page
      path: /wiki/rest/api/content/{{page_id}}
      operations:
      - {name: get-page, method: GET, inputParameters: [{name: page_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: wiki-companion-capability-rest
    description: REST surface for wiki companion.
    resources:
    - {name: search, path: /search, operations: [{method: GET, name: search-wiki, call: confluence.search-wiki}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: wiki-companion-capability-mcp
    description: MCP for wiki companion.
    tools:
    - {name: search-wiki, hints: {readOnly: true}, call: confluence.search-wiki}
    - name: get-page
      hints: {readOnly: true}
      inputParameters: [{name: page_id, type: string, required: true}]
      call: confluence.get-page
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: wiki-companion-capability-skills
    description: Skill for wiki companion.
    skills:
    - name: wiki-companion-capability
      description: Wiki companion.
      location: file:///opt/naftiko/skills/wiki-companion-capability
      allowed-tools: search-wiki,get-page
      tools:
      - {name: search-wiki, from: {sourceNamespace: wiki-companion-capability-mcp, action: search-wiki}}
      - {name: get-page, from: {sourceNamespace: wiki-companion-capability-mcp, action: get-page}}
