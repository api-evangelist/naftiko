naftiko: 1.0.0-alpha2
info:
  title: Spectral Rule Pack Runner
  description: A capability that runs a curated Spectral rule pack against an OpenAPI spec and emits a violations report.
  tags: [Naftiko, Spectral, Rule Pack]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: stoplight-env
  keys: {STOPLIGHT_TOKEN: STOPLIGHT_TOKEN}
capability:
  consumes:
  - namespace: stoplight
    type: http
    baseUri: https://api.stoplight.io
    authentication: {type: bearer, token: '{{STOPLIGHT_TOKEN}}'}
    resources:
    - {name: rulesets, path: /v1/rulesets, operations: [{name: list-rulesets, method: GET}]}
    - name: lint
      path: /v1/projects/{{project_id}}/lint
      operations:
      - {name: lint-with-rule-pack, method: POST, inputParameters: [{name: project_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: spectral-rule-pack-runner-rest
    description: REST surface for Spectral rule-pack runs.
    resources:
    - {name: run, path: /run, operations: [{method: POST, name: lint-with-rule-pack, call: stoplight.lint-with-rule-pack}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: spectral-rule-pack-runner-mcp
    description: MCP for rule-pack runs.
    tools:
    - {name: list-rulesets, hints: {readOnly: true}, call: stoplight.list-rulesets}
    - {name: lint-with-rule-pack, call: stoplight.lint-with-rule-pack}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: spectral-rule-pack-runner-skills
    description: Skill for rule-pack runs.
    skills:
    - name: spectral-rule-pack-runner
      description: Spectral rule-pack runner.
      location: file:///opt/naftiko/skills/spectral-rule-pack-runner
      allowed-tools: list-rulesets,lint-with-rule-pack
      tools:
      - {name: list-rulesets, from: {sourceNamespace: spectral-rule-pack-runner-mcp, action: list-rulesets}}
      - {name: lint-with-rule-pack, from: {sourceNamespace: spectral-rule-pack-runner-mcp, action: lint-with-rule-pack}}
