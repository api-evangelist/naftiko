naftiko: 1.0.0-alpha2
info:
  title: Bnp Tyk Gateway Mirrored Banking Capability
  description: A capability mirroring BNP banking APIs through a Tyk gateway with rate-limit and quota-policy enforcement.
  tags: [Naftiko, BNP, Tyk, Gateway]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: tyk-env
  keys: {TYK_HOST: TYK_HOST, TYK_TOKEN: TYK_TOKEN}
capability:
  consumes:
  - namespace: tyk
    type: http
    baseUri: https://{{TYK_HOST}}
    authentication: {type: bearer, token: '{{TYK_TOKEN}}'}
    resources:
    - {name: apis, path: /api/apis, operations: [{name: list-apis, method: GET}]}
    - name: api
      path: /api/apis/{{api_id}}
      operations:
      - {name: get-api, method: GET, inputParameters: [{name: api_id, in: path}]}
    - name: keys
      path: /api/keys
      operations: [{name: create-key, method: POST}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: bnp-tyk-gateway-mirrored-banking-capability-rest
    description: REST surface listing mirrored Tyk APIs.
    resources:
    - {name: apis, path: /apis, operations: [{method: GET, name: list-mirrored-apis, call: tyk.list-apis}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: bnp-tyk-gateway-mirrored-banking-capability-mcp
    description: MCP for Tyk-mirrored banking ops.
    tools:
    - {name: list-mirrored-apis, hints: {readOnly: true}, call: tyk.list-apis}
    - name: create-key
      call: tyk.create-key
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: bnp-tyk-gateway-mirrored-banking-capability-skills
    description: Skill for Tyk-mirrored banking.
    skills:
    - name: bnp-tyk-gateway-mirrored-banking-capability
      description: Tyk-mirrored BNP banking.
      location: file:///opt/naftiko/skills/bnp-tyk-gateway-mirrored-banking-capability
      allowed-tools: list-mirrored-apis,create-key
      tools:
      - {name: list-mirrored-apis, from: {sourceNamespace: bnp-tyk-gateway-mirrored-banking-capability-mcp, action: list-mirrored-apis}}
      - {name: create-key, from: {sourceNamespace: bnp-tyk-gateway-mirrored-banking-capability-mcp, action: create-key}}
