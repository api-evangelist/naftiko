naftiko: 1.0.0-alpha2
info:
  title: Apigee Mcp Mirror Collection
  description: A collection capability that mirrors every Apigee API proxy as an MCP server, so anything published to Apigee is automatically reachable from MCP-aware agents.
  tags: [Naftiko, Apigee, MCP, Mirror]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: apigee-env
  keys: {APIGEE_TOKEN: APIGEE_TOKEN, APIGEE_ORG: APIGEE_ORG, APIGEE_ENV: APIGEE_ENV}
capability:
  consumes:
  - namespace: apigee
    type: http
    baseUri: https://apigee.googleapis.com
    authentication: {type: bearer, token: '{{APIGEE_TOKEN}}'}
    resources:
    - name: api-proxies
      path: /v1/organizations/{{APIGEE_ORG}}/apis
      operations: [{name: list-api-proxies, method: GET}]
    - name: api-proxy
      path: /v1/organizations/{{APIGEE_ORG}}/apis/{{api_name}}
      operations:
      - {name: get-api-proxy, method: GET, inputParameters: [{name: api_name, in: path}]}
    - name: deployments
      path: /v1/organizations/{{APIGEE_ORG}}/environments/{{APIGEE_ENV}}/deployments
      operations: [{name: list-deployments, method: GET}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: apigee-mcp-mirror-collection-rest
    description: REST surface exposing Apigee proxies as a unified mirror.
    resources:
    - name: proxies
      path: /proxies
      operations: [{method: GET, name: list-mirrored-proxies, description: List mirrored Apigee proxies., call: apigee.list-api-proxies}]
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: apigee-mcp-mirror-collection-mcp
    description: MCP server mirroring Apigee proxies as MCP tools.
    tools:
    - {name: list-mirrored-proxies, hints: {readOnly: true}, call: apigee.list-api-proxies}
    - name: get-proxy
      hints: {readOnly: true}
      inputParameters: [{name: api_name, type: string, required: true}]
      call: apigee.get-api-proxy
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: apigee-mcp-mirror-collection-skills
    description: Skill bundle for the Apigee MCP mirror.
    skills:
    - name: apigee-mcp-mirror-collection
      description: Mirror Apigee proxies as MCP tools.
      location: file:///opt/naftiko/skills/apigee-mcp-mirror-collection
      allowed-tools: list-mirrored-proxies,get-proxy
      tools:
      - {name: list-mirrored-proxies, from: {sourceNamespace: apigee-mcp-mirror-collection-mcp, action: list-mirrored-proxies}}
      - {name: get-proxy, from: {sourceNamespace: apigee-mcp-mirror-collection-mcp, action: get-proxy}}
