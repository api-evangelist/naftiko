naftiko: 1.0.0-alpha2
info:
  title: Temenos French Banking Ccf Capability
  description: A capability over Temenos Transact for French banking, with continuous-compliance-framework checks tailored to French regulators.
  tags: [Naftiko, Temenos, French Banking, CCF]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: temenos-env
  keys: {TEMENOS_HOST: TEMENOS_HOST, TEMENOS_TOKEN: TEMENOS_TOKEN}
capability:
  consumes:
  - namespace: temenos
    type: http
    baseUri: https://{{TEMENOS_HOST}}
    authentication: {type: bearer, token: '{{TEMENOS_TOKEN}}'}
    resources:
    - name: account
      path: '/irf-provider-container/api/v1.0.0/holdings/accounts/{{account_id}}'
      operations:
      - {name: get-account, method: GET, inputParameters: [{name: account_id, in: path}]}
    - name: transactions
      path: '/irf-provider-container/api/v1.0.0/holdings/accounts/{{account_id}}/transactions'
      operations:
      - {name: list-transactions, method: GET, inputParameters: [{name: account_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: temenos-french-banking-ccf-capability-rest
    description: REST surface for French banking Temenos+CCF.
    resources:
    - {name: accounts, path: '/accounts/{{account_id}}', operations: [{method: GET, name: get-account, inputParameters: [{name: account_id, in: path, type: string}], call: temenos.get-account}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: temenos-french-banking-ccf-capability-mcp
    description: MCP for French banking Temenos+CCF.
    tools:
    - name: get-account
      hints: {readOnly: true}
      inputParameters: [{name: account_id, type: string, required: true}]
      call: temenos.get-account
    - name: list-transactions
      hints: {readOnly: true}
      inputParameters: [{name: account_id, type: string, required: true}]
      call: temenos.list-transactions
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: temenos-french-banking-ccf-capability-skills
    description: Skill for French banking Temenos+CCF.
    skills:
    - name: temenos-french-banking-ccf-capability
      description: French banking Temenos+CCF.
      location: file:///opt/naftiko/skills/temenos-french-banking-ccf-capability
      allowed-tools: get-account,list-transactions
      tools:
      - {name: get-account, from: {sourceNamespace: temenos-french-banking-ccf-capability-mcp, action: get-account}}
      - {name: list-transactions, from: {sourceNamespace: temenos-french-banking-ccf-capability-mcp, action: list-transactions}}
