naftiko: 1.0.0-alpha2
info:
  title: Schneider Jfrog Artifactory Mcp Package Resolver
  description: Schneider Electric MCP capability over JFrog Artifactory for resolving package versions and metadata.
  tags: [Naftiko, Schneider, JFrog, Artifactory]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: jfrog-env
  keys: {JFROG_HOST: JFROG_HOST, JFROG_TOKEN: JFROG_TOKEN}
capability:
  consumes:
  - namespace: jfrog
    type: http
    baseUri: https://{{JFROG_HOST}}
    authentication: {type: bearer, token: '{{JFROG_TOKEN}}'}
    resources:
    - {name: search, path: /artifactory/api/search/artifact, operations: [{name: search-artifacts, method: GET}]}
    - name: artifact
      path: /artifactory/api/storage/{{repo}}/{{path}}
      operations:
      - {name: get-artifact-metadata, method: GET, inputParameters: [{name: repo, in: path}, {name: path, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-jfrog-artifactory-mcp-package-resolver-rest
    description: REST surface for Artifactory resolver.
    resources:
    - {name: resolve, path: /resolve, operations: [{method: GET, name: resolve-package, call: jfrog.search-artifacts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-jfrog-artifactory-mcp-package-resolver-mcp
    description: MCP for Artifactory resolver.
    tools:
    - {name: search-artifacts, hints: {readOnly: true}, call: jfrog.search-artifacts}
    - name: get-artifact-metadata
      hints: {readOnly: true}
      inputParameters: [{name: repo, type: string, required: true}, {name: path, type: string, required: true}]
      call: jfrog.get-artifact-metadata
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-jfrog-artifactory-mcp-package-resolver-skills
    description: Skill for Artifactory resolver.
    skills:
    - name: schneider-jfrog-artifactory-mcp-package-resolver
      description: JFrog Artifactory resolver.
      location: file:///opt/naftiko/skills/schneider-jfrog-artifactory-mcp-package-resolver
      allowed-tools: search-artifacts,get-artifact-metadata
      tools:
      - {name: search-artifacts, from: {sourceNamespace: schneider-jfrog-artifactory-mcp-package-resolver-mcp, action: search-artifacts}}
      - {name: get-artifact-metadata, from: {sourceNamespace: schneider-jfrog-artifactory-mcp-package-resolver-mcp, action: get-artifact-metadata}}
