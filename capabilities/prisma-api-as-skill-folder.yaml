naftiko: 1.0.0-alpha2
info:
  title: Prisma Api As Skill Folder
  description: A capability that wraps a Palo Alto Prisma API as a downloadable Agent Skill folder.
  tags: [Naftiko, Prisma, Skill Folder]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: prisma-env
  keys: {PRISMA_HOST: PRISMA_HOST, PRISMA_TOKEN: PRISMA_TOKEN}
capability:
  consumes:
  - namespace: prisma
    type: http
    baseUri: https://{{PRISMA_HOST}}
    authentication: {type: bearer, token: '{{PRISMA_TOKEN}}'}
    resources:
    - {name: alerts, path: /alerts, operations: [{name: list-alerts, method: GET}]}
    - name: alert
      path: /alerts/{{alert_id}}
      operations:
      - {name: get-alert, method: GET, inputParameters: [{name: alert_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: prisma-api-as-skill-folder-rest
    description: REST surface for Prisma alerts.
    resources:
    - {name: alerts, path: /alerts, operations: [{method: GET, name: list-alerts, call: prisma.list-alerts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: prisma-api-as-skill-folder-mcp
    description: MCP for Prisma alerts.
    tools:
    - {name: list-alerts, hints: {readOnly: true}, call: prisma.list-alerts}
    - name: get-alert
      hints: {readOnly: true}
      inputParameters: [{name: alert_id, type: string, required: true}]
      call: prisma.get-alert
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: prisma-api-as-skill-folder-skills
    description: Skill folder for Prisma alerts.
    skills:
    - name: prisma-api-as-skill-folder
      description: Prisma API as Skill folder.
      location: file:///opt/naftiko/skills/prisma-api-as-skill-folder
      allowed-tools: list-alerts,get-alert
      tools:
      - {name: list-alerts, from: {sourceNamespace: prisma-api-as-skill-folder-mcp, action: list-alerts}}
      - {name: get-alert, from: {sourceNamespace: prisma-api-as-skill-folder-mcp, action: get-alert}}
