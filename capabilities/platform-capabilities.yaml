naftiko: 1.0.0-alpha2
info:
  title: Platform Capabilities
  description: A collection capability listing all platform capabilities the Naftiko control plane offers.
  tags: [Naftiko, Platform, Collection]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: capabilities, path: /v1/capabilities, operations: [{name: list-capabilities, method: GET}]}
    - name: capability
      path: /v1/capabilities/{{capability_id}}
      operations:
      - {name: get-capability, method: GET, inputParameters: [{name: capability_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: platform-capabilities-rest
    description: REST surface for platform capabilities.
    resources:
    - {name: capabilities, path: /capabilities, operations: [{method: GET, name: list-capabilities, call: naftiko-control.list-capabilities}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: platform-capabilities-mcp
    description: MCP for platform capabilities.
    tools:
    - {name: list-capabilities, hints: {readOnly: true}, call: naftiko-control.list-capabilities}
    - name: get-capability
      hints: {readOnly: true}
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-control.get-capability
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: platform-capabilities-skills
    description: Skill for platform capabilities.
    skills:
    - name: platform-capabilities
      description: Platform capabilities collection.
      location: file:///opt/naftiko/skills/platform-capabilities
      allowed-tools: list-capabilities,get-capability
      tools:
      - {name: list-capabilities, from: {sourceNamespace: platform-capabilities-mcp, action: list-capabilities}}
      - {name: get-capability, from: {sourceNamespace: platform-capabilities-mcp, action: get-capability}}
