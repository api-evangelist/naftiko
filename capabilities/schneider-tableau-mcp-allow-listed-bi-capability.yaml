naftiko: 1.0.0-alpha2
info:
  title: Schneider Tableau Mcp Allow Listed Bi Capability
  description: Schneider Electric MCP capability over Tableau, restricted to an allow-listed set of dashboards/views for governed BI access.
  tags: [Naftiko, Schneider, Tableau, BI]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: tableau-env
  keys: {TABLEAU_HOST: TABLEAU_HOST, TABLEAU_TOKEN: TABLEAU_TOKEN, TABLEAU_SITE_ID: TABLEAU_SITE_ID}
capability:
  consumes:
  - namespace: tableau
    type: http
    baseUri: https://{{TABLEAU_HOST}}
    authentication: {type: bearer, token: '{{TABLEAU_TOKEN}}'}
    resources:
    - name: views
      path: /api/3.20/sites/{{TABLEAU_SITE_ID}}/views
      operations: [{name: list-views, method: GET}]
    - name: view-data
      path: /api/3.20/sites/{{TABLEAU_SITE_ID}}/views/{{view_id}}/data
      operations:
      - {name: get-view-data, method: GET, inputParameters: [{name: view_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-tableau-mcp-allow-listed-bi-capability-rest
    description: REST surface for allow-listed Tableau BI.
    resources:
    - {name: views, path: /views, operations: [{method: GET, name: list-allow-listed-views, call: tableau.list-views}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-tableau-mcp-allow-listed-bi-capability-mcp
    description: MCP for allow-listed Tableau BI.
    tools:
    - {name: list-allow-listed-views, hints: {readOnly: true}, call: tableau.list-views}
    - name: get-view-data
      hints: {readOnly: true}
      inputParameters: [{name: view_id, type: string, required: true}]
      call: tableau.get-view-data
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-tableau-mcp-allow-listed-bi-capability-skills
    description: Skill for allow-listed Tableau BI.
    skills:
    - name: schneider-tableau-mcp-allow-listed-bi-capability
      description: Allow-listed Tableau BI access.
      location: file:///opt/naftiko/skills/schneider-tableau-mcp-allow-listed-bi-capability
      allowed-tools: list-allow-listed-views,get-view-data
      tools:
      - {name: list-allow-listed-views, from: {sourceNamespace: schneider-tableau-mcp-allow-listed-bi-capability-mcp, action: list-allow-listed-views}}
      - {name: get-view-data, from: {sourceNamespace: schneider-tableau-mcp-allow-listed-bi-capability-mcp, action: get-view-data}}
