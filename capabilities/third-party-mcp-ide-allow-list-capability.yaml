naftiko: 1.0.0-alpha2
info:
  title: Third Party Mcp Ide Allow List Capability
  description: A capability defining the IDE-side allow-list for third-party MCP servers — agents in IDEs can only call listed MCPs.
  tags: [Naftiko, MCP, IDE, Allow-List]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: ide-allow-list, path: /v1/ide-mcp-allow-list, operations: [{name: get-ide-allow-list, method: GET}, {name: update-ide-allow-list, method: PUT}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: third-party-mcp-ide-allow-list-capability-rest
    description: REST surface for IDE allow-list.
    resources:
    - {name: allow-list, path: /allow-list, operations: [{method: GET, name: get-ide-allow-list, call: naftiko-control.get-ide-allow-list}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: third-party-mcp-ide-allow-list-capability-mcp
    description: MCP for IDE allow-list.
    tools:
    - {name: get-ide-allow-list, hints: {readOnly: true}, call: naftiko-control.get-ide-allow-list}
    - {name: update-ide-allow-list, call: naftiko-control.update-ide-allow-list}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: third-party-mcp-ide-allow-list-capability-skills
    description: Skill for IDE allow-list.
    skills:
    - name: third-party-mcp-ide-allow-list-capability
      description: IDE MCP allow-list.
      location: file:///opt/naftiko/skills/third-party-mcp-ide-allow-list-capability
      allowed-tools: get-ide-allow-list,update-ide-allow-list
      tools:
      - {name: get-ide-allow-list, from: {sourceNamespace: third-party-mcp-ide-allow-list-capability-mcp, action: get-ide-allow-list}}
      - {name: update-ide-allow-list, from: {sourceNamespace: third-party-mcp-ide-allow-list-capability-mcp, action: update-ide-allow-list}}
