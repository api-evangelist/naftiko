naftiko: 1.0.0-alpha2
info:
  title: Vehicle Telemetry Mcp
  description: A capability over a vehicle-telemetry API (HERE / Smartcar) exposing real-time telematics as MCP tools.
  tags: [Naftiko, Vehicle, Telematics]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: smartcar-env
  keys: {SMARTCAR_TOKEN: SMARTCAR_TOKEN}
capability:
  consumes:
  - namespace: smartcar
    type: http
    baseUri: https://api.smartcar.com
    authentication: {type: bearer, token: '{{SMARTCAR_TOKEN}}'}
    resources:
    - {name: vehicles, path: /v2.0/vehicles, operations: [{name: list-vehicles, method: GET}]}
    - name: vehicle-location
      path: /v2.0/vehicles/{{vehicle_id}}/location
      operations:
      - {name: get-location, method: GET, inputParameters: [{name: vehicle_id, in: path}]}
    - name: vehicle-odometer
      path: /v2.0/vehicles/{{vehicle_id}}/odometer
      operations:
      - {name: get-odometer, method: GET, inputParameters: [{name: vehicle_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: vehicle-telemetry-mcp-rest
    description: REST surface for vehicle telemetry.
    resources:
    - {name: vehicles, path: /vehicles, operations: [{method: GET, name: list-vehicles, call: smartcar.list-vehicles}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: vehicle-telemetry-mcp-mcp
    description: MCP for vehicle telemetry.
    tools:
    - {name: list-vehicles, hints: {readOnly: true}, call: smartcar.list-vehicles}
    - name: get-location
      hints: {readOnly: true}
      inputParameters: [{name: vehicle_id, type: string, required: true}]
      call: smartcar.get-location
    - name: get-odometer
      hints: {readOnly: true}
      inputParameters: [{name: vehicle_id, type: string, required: true}]
      call: smartcar.get-odometer
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: vehicle-telemetry-mcp-skills
    description: Skill for vehicle telemetry.
    skills:
    - name: vehicle-telemetry-mcp
      description: Vehicle telemetry.
      location: file:///opt/naftiko/skills/vehicle-telemetry-mcp
      allowed-tools: list-vehicles,get-location,get-odometer
      tools:
      - {name: list-vehicles, from: {sourceNamespace: vehicle-telemetry-mcp-mcp, action: list-vehicles}}
      - {name: get-location, from: {sourceNamespace: vehicle-telemetry-mcp-mcp, action: get-location}}
      - {name: get-odometer, from: {sourceNamespace: vehicle-telemetry-mcp-mcp, action: get-odometer}}
