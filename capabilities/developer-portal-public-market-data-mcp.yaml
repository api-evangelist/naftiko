naftiko: 1.0.0-alpha2
info:
  title: Developer Portal Public Market Data Mcp
  description: A capability over a public market-data API exposed through a developer portal as MCP, so external developers can pull quotes via agents.
  tags: [Naftiko, Market Data, Developer Portal]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: alphavantage-env
  keys: {ALPHAVANTAGE_API_KEY: ALPHAVANTAGE_API_KEY}
capability:
  consumes:
  - namespace: alphavantage
    type: http
    baseUri: https://www.alphavantage.co
    resources:
    - name: quote
      path: /query
      operations:
      - {name: get-quote, method: GET, inputParameters: [{name: function, in: query}, {name: symbol, in: query}, {name: apikey, in: query}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: developer-portal-public-market-data-mcp-rest
    description: REST surface for public market data.
    resources:
    - {name: quote, path: /quote/{{symbol}}, operations: [{method: GET, name: get-quote, inputParameters: [{name: symbol, in: path, type: string}], call: alphavantage.get-quote}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: developer-portal-public-market-data-mcp-mcp
    description: MCP for public market data.
    tools:
    - name: get-quote
      hints: {readOnly: true}
      inputParameters: [{name: symbol, type: string, required: true}]
      call: alphavantage.get-quote
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: developer-portal-public-market-data-mcp-skills
    description: Skill for public market data.
    skills:
    - name: developer-portal-public-market-data-mcp
      description: Public market-data MCP via developer portal.
      location: file:///opt/naftiko/skills/developer-portal-public-market-data-mcp
      allowed-tools: get-quote
      tools:
      - {name: get-quote, from: {sourceNamespace: developer-portal-public-market-data-mcp-mcp, action: get-quote}}
