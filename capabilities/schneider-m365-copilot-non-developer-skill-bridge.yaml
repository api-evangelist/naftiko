naftiko: 1.0.0-alpha2
info:
  title: Schneider M365 Copilot Non Developer Skill Bridge
  description: Schneider Electric bridge surfacing Naftiko skills to M365 Copilot for non-developer users via Microsoft Graph extensions.
  tags: [Naftiko, Schneider, M365, Copilot]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: msgraph-env
  keys: {MSGRAPH_TOKEN: MSGRAPH_TOKEN}
capability:
  consumes:
  - namespace: msgraph
    type: http
    baseUri: https://graph.microsoft.com
    authentication: {type: bearer, token: '{{MSGRAPH_TOKEN}}'}
    resources:
    - {name: copilot-extensions, path: /v1.0/copilot/extensions, operations: [{name: list-copilot-extensions, method: GET}]}
    - {name: register-extension, path: /v1.0/copilot/extensions, operations: [{name: register-extension, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-m365-copilot-non-developer-skill-bridge-rest
    description: REST surface for M365 Copilot non-dev skill bridge.
    resources:
    - {name: register, path: /register, operations: [{method: POST, name: register-extension, call: msgraph.register-extension}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-m365-copilot-non-developer-skill-bridge-mcp
    description: MCP for the M365 Copilot bridge.
    tools:
    - {name: list-copilot-extensions, hints: {readOnly: true}, call: msgraph.list-copilot-extensions}
    - {name: register-extension, call: msgraph.register-extension}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-m365-copilot-non-developer-skill-bridge-skills
    description: Skill for the M365 Copilot bridge.
    skills:
    - name: schneider-m365-copilot-non-developer-skill-bridge
      description: M365 Copilot non-developer skill bridge.
      location: file:///opt/naftiko/skills/schneider-m365-copilot-non-developer-skill-bridge
      allowed-tools: list-copilot-extensions,register-extension
      tools:
      - {name: list-copilot-extensions, from: {sourceNamespace: schneider-m365-copilot-non-developer-skill-bridge-mcp, action: list-copilot-extensions}}
      - {name: register-extension, from: {sourceNamespace: schneider-m365-copilot-non-developer-skill-bridge-mcp, action: register-extension}}
