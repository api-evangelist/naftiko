naftiko: 1.0.0-alpha2
info:
  title: Cpaas Mcp Collection
  description: A collection of CPaaS (communications platform) capabilities — SMS, voice, WhatsApp — exposed as MCP tools for agent flows.
  tags: [Naftiko, CPaaS, Twilio]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: twilio-env
  keys: {TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN}
capability:
  consumes:
  - namespace: twilio
    type: http
    baseUri: https://api.twilio.com
    authentication: {type: basic, username: '{{TWILIO_ACCOUNT_SID}}', password: '{{TWILIO_AUTH_TOKEN}}'}
    resources:
    - {name: messages, path: /2010-04-01/Accounts/{{TWILIO_ACCOUNT_SID}}/Messages.json, operations: [{name: send-sms, method: POST}, {name: list-messages, method: GET}]}
    - {name: calls, path: /2010-04-01/Accounts/{{TWILIO_ACCOUNT_SID}}/Calls.json, operations: [{name: place-call, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: cpaas-mcp-collection-rest
    description: REST surface for CPaaS ops.
    resources:
    - {name: send-sms, path: /sms, operations: [{method: POST, name: send-sms, call: twilio.send-sms}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: cpaas-mcp-collection-mcp
    description: MCP for CPaaS ops.
    tools:
    - {name: send-sms, call: twilio.send-sms}
    - {name: place-call, call: twilio.place-call}
    - {name: list-messages, hints: {readOnly: true}, call: twilio.list-messages}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: cpaas-mcp-collection-skills
    description: Skill for CPaaS.
    skills:
    - name: cpaas-mcp-collection
      description: CPaaS MCP collection (SMS, voice).
      location: file:///opt/naftiko/skills/cpaas-mcp-collection
      allowed-tools: send-sms,place-call,list-messages
      tools:
      - {name: send-sms, from: {sourceNamespace: cpaas-mcp-collection-mcp, action: send-sms}}
      - {name: place-call, from: {sourceNamespace: cpaas-mcp-collection-mcp, action: place-call}}
      - {name: list-messages, from: {sourceNamespace: cpaas-mcp-collection-mcp, action: list-messages}}
