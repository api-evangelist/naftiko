naftiko: 1.0.0-alpha2
info:
  title: Stealth Differentiator Bridge Capability
  description: A stealth-launch capability over the Naftiko platform exposing a curated subset for the Naftiko stealth program.
  tags: [Naftiko, Stealth]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: stealth-capabilities, path: /v1/stealth/capabilities, operations: [{name: list-stealth-capabilities, method: GET}]}
    - name: stealth-capability-invoke
      path: /v1/stealth/capabilities/{{capability_id}}/invoke
      operations:
      - {name: invoke-stealth-capability, method: POST, inputParameters: [{name: capability_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: stealth-differentiator-bridge-capability-rest
    description: REST surface for stealth capability.
    resources:
    - {name: capabilities, path: /capabilities, operations: [{method: GET, name: list-stealth-capabilities, call: naftiko-control.list-stealth-capabilities}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: stealth-differentiator-bridge-capability-mcp
    description: MCP for stealth capability.
    tools:
    - {name: list-stealth-capabilities, hints: {readOnly: true}, call: naftiko-control.list-stealth-capabilities}
    - name: invoke-stealth-capability
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-control.invoke-stealth-capability
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: stealth-differentiator-bridge-capability-skills
    description: Skill for stealth capability.
    skills:
    - name: stealth-differentiator-bridge-capability
      description: Naftiko stealth capability.
      location: file:///opt/naftiko/skills/stealth-differentiator-bridge-capability
      allowed-tools: list-stealth-capabilities,invoke-stealth-capability
      tools:
      - {name: list-stealth-capabilities, from: {sourceNamespace: stealth-differentiator-bridge-capability-mcp, action: list-stealth-capabilities}}
      - {name: invoke-stealth-capability, from: {sourceNamespace: stealth-differentiator-bridge-capability-mcp, action: invoke-stealth-capability}}
