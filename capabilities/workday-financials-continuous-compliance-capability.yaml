naftiko: 1.0.0-alpha2
info:
  title: Workday Financials Continuous Compliance Capability
  description: A capability over Workday Financials with continuous-compliance checks enforced on every read/write.
  tags: [Naftiko, Workday, Financials, CCF]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: workday-env
  keys: {WORKDAY_HOST: WORKDAY_HOST, WORKDAY_TOKEN: WORKDAY_TOKEN}
capability:
  consumes:
  - namespace: workday
    type: http
    baseUri: https://{{WORKDAY_HOST}}
    authentication: {type: bearer, token: '{{WORKDAY_TOKEN}}'}
    resources:
    - {name: ledger-accounts, path: /ccx/api/financialManagement/v1/ledgerAccounts, operations: [{name: list-ledger-accounts, method: GET}]}
    - name: journal-entries
      path: /ccx/api/financialManagement/v1/journalEntries
      operations: [{name: list-journal-entries, method: GET}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: workday-financials-continuous-compliance-capability-rest
    description: REST surface for governed Workday Financials.
    resources:
    - {name: ledger, path: /ledger-accounts, operations: [{method: GET, name: list-ledger-accounts, call: workday.list-ledger-accounts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: workday-financials-continuous-compliance-capability-mcp
    description: MCP for governed Workday Financials.
    tools:
    - {name: list-ledger-accounts, hints: {readOnly: true}, call: workday.list-ledger-accounts}
    - {name: list-journal-entries, hints: {readOnly: true}, call: workday.list-journal-entries}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: workday-financials-continuous-compliance-capability-skills
    description: Skill for governed Workday Financials.
    skills:
    - name: workday-financials-continuous-compliance-capability
      description: Governed Workday Financials.
      location: file:///opt/naftiko/skills/workday-financials-continuous-compliance-capability
      allowed-tools: list-ledger-accounts,list-journal-entries
      tools:
      - {name: list-ledger-accounts, from: {sourceNamespace: workday-financials-continuous-compliance-capability-mcp, action: list-ledger-accounts}}
      - {name: list-journal-entries, from: {sourceNamespace: workday-financials-continuous-compliance-capability-mcp, action: list-journal-entries}}
