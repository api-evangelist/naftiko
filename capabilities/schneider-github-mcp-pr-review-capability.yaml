naftiko: 1.0.0-alpha2
info:
  title: Schneider Github Mcp Pr Review Capability
  description: Schneider Electric MCP capability for AI-driven GitHub PR review — list PRs, get diff, post review comments.
  tags: [Naftiko, Schneider, GitHub, PR Review]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: github-env
  keys: {GITHUB_TOKEN: GITHUB_TOKEN}
capability:
  consumes:
  - namespace: github
    type: http
    baseUri: https://api.github.com
    authentication: {type: bearer, token: '{{GITHUB_TOKEN}}'}
    resources:
    - name: pulls
      path: '/repos/{{owner}}/{{repo}}/pulls'
      operations:
      - {name: list-pulls, method: GET, inputParameters: [{name: owner, in: path}, {name: repo, in: path}]}
    - name: pull-files
      path: '/repos/{{owner}}/{{repo}}/pulls/{{pull_number}}/files'
      operations:
      - {name: list-pull-files, method: GET, inputParameters: [{name: owner, in: path}, {name: repo, in: path}, {name: pull_number, in: path}]}
    - name: pull-reviews
      path: '/repos/{{owner}}/{{repo}}/pulls/{{pull_number}}/reviews'
      operations:
      - {name: post-review, method: POST, inputParameters: [{name: owner, in: path}, {name: repo, in: path}, {name: pull_number, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-github-mcp-pr-review-capability-rest
    description: REST surface for GitHub PR review.
    resources:
    - {name: pulls, path: '/pulls/{{owner}}/{{repo}}', operations: [{method: GET, name: list-pulls, inputParameters: [{name: owner, in: path, type: string}, {name: repo, in: path, type: string}], call: github.list-pulls}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-github-mcp-pr-review-capability-mcp
    description: MCP for GitHub PR review.
    tools:
    - name: list-pulls
      hints: {readOnly: true}
      inputParameters: [{name: owner, type: string, required: true}, {name: repo, type: string, required: true}]
      call: github.list-pulls
    - name: list-pull-files
      hints: {readOnly: true}
      inputParameters: [{name: owner, type: string, required: true}, {name: repo, type: string, required: true}, {name: pull_number, type: string, required: true}]
      call: github.list-pull-files
    - name: post-review
      inputParameters: [{name: owner, type: string, required: true}, {name: repo, type: string, required: true}, {name: pull_number, type: string, required: true}]
      call: github.post-review
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-github-mcp-pr-review-capability-skills
    description: Skill for GitHub PR review.
    skills:
    - name: schneider-github-mcp-pr-review-capability
      description: GitHub PR review.
      location: file:///opt/naftiko/skills/schneider-github-mcp-pr-review-capability
      allowed-tools: list-pulls,list-pull-files,post-review
      tools:
      - {name: list-pulls, from: {sourceNamespace: schneider-github-mcp-pr-review-capability-mcp, action: list-pulls}}
      - {name: list-pull-files, from: {sourceNamespace: schneider-github-mcp-pr-review-capability-mcp, action: list-pull-files}}
      - {name: post-review, from: {sourceNamespace: schneider-github-mcp-pr-review-capability-mcp, action: post-review}}
