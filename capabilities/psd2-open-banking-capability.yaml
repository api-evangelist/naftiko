naftiko: 1.0.0-alpha2
info:
  title: Psd2 Open Banking Capability
  description: A capability over the Berlin Group PSD2 NextGenPSD2 API — accounts, balances, transactions, payments.
  tags: [Naftiko, PSD2, Berlin Group]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: psd2-env
  keys: {PSD2_HOST: PSD2_HOST, PSD2_TOKEN: PSD2_TOKEN}
capability:
  consumes:
  - namespace: psd2
    type: http
    baseUri: https://{{PSD2_HOST}}
    authentication: {type: bearer, token: '{{PSD2_TOKEN}}'}
    resources:
    - {name: accounts, path: /berlingroup/v1/accounts, operations: [{name: list-accounts, method: GET}]}
    - name: account-balances
      path: /berlingroup/v1/accounts/{{account_id}}/balances
      operations:
      - {name: get-account-balances, method: GET, inputParameters: [{name: account_id, in: path}]}
    - name: account-transactions
      path: /berlingroup/v1/accounts/{{account_id}}/transactions
      operations:
      - {name: list-transactions, method: GET, inputParameters: [{name: account_id, in: path}]}
    - name: payments
      path: /berlingroup/v1/payments/{{payment_product}}
      operations:
      - {name: initiate-payment, method: POST, inputParameters: [{name: payment_product, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: psd2-open-banking-capability-rest
    description: REST surface for PSD2 NextGenPSD2.
    resources:
    - {name: accounts, path: /accounts, operations: [{method: GET, name: list-accounts, call: psd2.list-accounts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: psd2-open-banking-capability-mcp
    description: MCP for PSD2 NextGenPSD2.
    tools:
    - {name: list-accounts, hints: {readOnly: true}, call: psd2.list-accounts}
    - name: get-account-balances
      hints: {readOnly: true}
      inputParameters: [{name: account_id, type: string, required: true}]
      call: psd2.get-account-balances
    - name: list-transactions
      hints: {readOnly: true}
      inputParameters: [{name: account_id, type: string, required: true}]
      call: psd2.list-transactions
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: psd2-open-banking-capability-skills
    description: Skill for PSD2.
    skills:
    - name: psd2-open-banking-capability
      description: PSD2 NextGenPSD2 banking.
      location: file:///opt/naftiko/skills/psd2-open-banking-capability
      allowed-tools: list-accounts,get-account-balances,list-transactions
      tools:
      - {name: list-accounts, from: {sourceNamespace: psd2-open-banking-capability-mcp, action: list-accounts}}
      - {name: get-account-balances, from: {sourceNamespace: psd2-open-banking-capability-mcp, action: get-account-balances}}
      - {name: list-transactions, from: {sourceNamespace: psd2-open-banking-capability-mcp, action: list-transactions}}
