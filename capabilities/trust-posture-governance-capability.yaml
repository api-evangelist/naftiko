naftiko: 1.0.0-alpha2
info:
  title: Trust Posture Governance Capability
  description: A capability over the Naftiko trust-posture engine — runs trust evaluations on consumed APIs and emits posture scores.
  tags: [Naftiko, Trust, Governance]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-trust
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: trust-postures, path: /v1/trust/postures, operations: [{name: list-trust-postures, method: GET}, {name: evaluate-trust, method: POST}]}
    - name: trust-posture
      path: '/v1/trust/postures/{{capability_id}}'
      operations:
      - {name: get-trust-posture, method: GET, inputParameters: [{name: capability_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: trust-posture-governance-capability-rest
    description: REST surface for trust posture.
    resources:
    - {name: posture, path: '/posture/{{capability_id}}', operations: [{method: GET, name: get-trust-posture, inputParameters: [{name: capability_id, in: path, type: string}], call: naftiko-trust.get-trust-posture}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: trust-posture-governance-capability-mcp
    description: MCP for trust posture.
    tools:
    - {name: list-trust-postures, hints: {readOnly: true}, call: naftiko-trust.list-trust-postures}
    - {name: evaluate-trust, call: naftiko-trust.evaluate-trust}
    - name: get-trust-posture
      hints: {readOnly: true}
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-trust.get-trust-posture
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: trust-posture-governance-capability-skills
    description: Skill for trust posture.
    skills:
    - name: trust-posture-governance-capability
      description: Trust-posture governance.
      location: file:///opt/naftiko/skills/trust-posture-governance-capability
      allowed-tools: list-trust-postures,evaluate-trust,get-trust-posture
      tools:
      - {name: list-trust-postures, from: {sourceNamespace: trust-posture-governance-capability-mcp, action: list-trust-postures}}
      - {name: evaluate-trust, from: {sourceNamespace: trust-posture-governance-capability-mcp, action: evaluate-trust}}
      - {name: get-trust-posture, from: {sourceNamespace: trust-posture-governance-capability-mcp, action: get-trust-posture}}
