naftiko: 1.0.0-alpha2
info:
  title: Public Market Data Capability
  description: A capability over public market-data (Alpha Vantage / Yahoo Finance) for retail-grade quote and historical data.
  tags: [Naftiko, Market Data, Alpha Vantage]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: alphavantage-env
  keys: {ALPHAVANTAGE_API_KEY: ALPHAVANTAGE_API_KEY}
capability:
  consumes:
  - namespace: alphavantage
    type: http
    baseUri: https://www.alphavantage.co
    resources:
    - {name: query, path: /query, operations: [{name: query-market-data, method: GET, inputParameters: [{name: function, in: query}, {name: symbol, in: query}, {name: apikey, in: query}]}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: public-market-data-capability-rest
    description: REST surface for public market data.
    resources:
    - {name: quote, path: '/quote/{{symbol}}', operations: [{method: GET, name: get-quote, inputParameters: [{name: symbol, in: path, type: string}], call: alphavantage.query-market-data}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: public-market-data-capability-mcp
    description: MCP for public market data.
    tools:
    - name: get-quote
      hints: {readOnly: true}
      inputParameters: [{name: symbol, type: string, required: true}]
      call: alphavantage.query-market-data
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: public-market-data-capability-skills
    description: Skill for public market data.
    skills:
    - name: public-market-data-capability
      description: Public market data.
      location: file:///opt/naftiko/skills/public-market-data-capability
      allowed-tools: get-quote
      tools:
      - {name: get-quote, from: {sourceNamespace: public-market-data-capability-mcp, action: get-quote}}
