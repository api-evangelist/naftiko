naftiko: 1.0.0-alpha2
info:
  title: Sdk Gen Pipeline Mirror Capability
  description: A capability mirroring an SDK-generation pipeline (Speakeasy/Stainless) so generated SDKs are downloadable from one Naftiko surface.
  tags: [Naftiko, SDK Gen, Speakeasy]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: speakeasy-env
  keys: {SPEAKEASY_API_KEY: SPEAKEASY_API_KEY}
capability:
  consumes:
  - namespace: speakeasy
    type: http
    baseUri: https://api.speakeasy.com
    authentication: {type: bearer, token: '{{SPEAKEASY_API_KEY}}'}
    resources:
    - {name: workspaces, path: /v1/workspaces, operations: [{name: list-workspaces, method: GET}]}
    - {name: artifacts, path: '/v1/workspaces/{{workspace_id}}/artifacts', operations: [{name: list-sdk-artifacts, method: GET, inputParameters: [{name: workspace_id, in: path}]}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: sdk-gen-pipeline-mirror-capability-rest
    description: REST surface for SDK pipeline mirror.
    resources:
    - {name: artifacts, path: '/artifacts/{{workspace_id}}', operations: [{method: GET, name: list-sdk-artifacts, inputParameters: [{name: workspace_id, in: path, type: string}], call: speakeasy.list-sdk-artifacts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: sdk-gen-pipeline-mirror-capability-mcp
    description: MCP for SDK pipeline mirror.
    tools:
    - {name: list-workspaces, hints: {readOnly: true}, call: speakeasy.list-workspaces}
    - name: list-sdk-artifacts
      hints: {readOnly: true}
      inputParameters: [{name: workspace_id, type: string, required: true}]
      call: speakeasy.list-sdk-artifacts
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: sdk-gen-pipeline-mirror-capability-skills
    description: Skill for SDK pipeline mirror.
    skills:
    - name: sdk-gen-pipeline-mirror-capability
      description: SDK gen pipeline mirror.
      location: file:///opt/naftiko/skills/sdk-gen-pipeline-mirror-capability
      allowed-tools: list-workspaces,list-sdk-artifacts
      tools:
      - {name: list-workspaces, from: {sourceNamespace: sdk-gen-pipeline-mirror-capability-mcp, action: list-workspaces}}
      - {name: list-sdk-artifacts, from: {sourceNamespace: sdk-gen-pipeline-mirror-capability-mcp, action: list-sdk-artifacts}}
