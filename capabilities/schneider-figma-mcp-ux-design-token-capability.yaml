naftiko: 1.0.0-alpha2
info:
  title: Schneider Figma Mcp Ux Design Token Capability
  description: Schneider Electric capability over Figma exposing design tokens (variables) as MCP for UX-engineering agents.
  tags: [Naftiko, Schneider, Figma, Design Tokens]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: figma-env
  keys: {FIGMA_TOKEN: FIGMA_TOKEN}
capability:
  consumes:
  - namespace: figma
    type: http
    baseUri: https://api.figma.com
    authentication: {type: bearer, token: '{{FIGMA_TOKEN}}'}
    resources:
    - name: variables
      path: '/v1/files/{{file_key}}/variables/local'
      operations:
      - {name: list-local-variables, method: GET, inputParameters: [{name: file_key, in: path}]}
    - name: styles
      path: '/v1/files/{{file_key}}/styles'
      operations:
      - {name: list-styles, method: GET, inputParameters: [{name: file_key, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-figma-mcp-ux-design-token-capability-rest
    description: REST surface for Schneider Figma design tokens.
    resources:
    - {name: tokens, path: '/tokens/{{file_key}}', operations: [{method: GET, name: list-design-tokens, inputParameters: [{name: file_key, in: path, type: string}], call: figma.list-local-variables}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-figma-mcp-ux-design-token-capability-mcp
    description: MCP for Schneider Figma design tokens.
    tools:
    - name: list-design-tokens
      hints: {readOnly: true}
      inputParameters: [{name: file_key, type: string, required: true}]
      call: figma.list-local-variables
    - name: list-styles
      hints: {readOnly: true}
      inputParameters: [{name: file_key, type: string, required: true}]
      call: figma.list-styles
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-figma-mcp-ux-design-token-capability-skills
    description: Skill for Schneider Figma design tokens.
    skills:
    - name: schneider-figma-mcp-ux-design-token-capability
      description: Schneider Figma design tokens.
      location: file:///opt/naftiko/skills/schneider-figma-mcp-ux-design-token-capability
      allowed-tools: list-design-tokens,list-styles
      tools:
      - {name: list-design-tokens, from: {sourceNamespace: schneider-figma-mcp-ux-design-token-capability-mcp, action: list-design-tokens}}
      - {name: list-styles, from: {sourceNamespace: schneider-figma-mcp-ux-design-token-capability-mcp, action: list-styles}}
