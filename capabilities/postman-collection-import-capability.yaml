naftiko: 1.0.0-alpha2
info:
  title: Postman Collection Import Capability
  description: A capability that imports a Postman collection and exposes its requests as Naftiko REST + MCP resources automatically.
  tags: [Naftiko, Postman, Import]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: postman-env
  keys: {POSTMAN_API_KEY: POSTMAN_API_KEY}
capability:
  consumes:
  - namespace: postman
    type: http
    baseUri: https://api.getpostman.com
    authentication: {type: bearer, token: '{{POSTMAN_API_KEY}}'}
    resources:
    - {name: collections, path: /collections, operations: [{name: list-collections, method: GET}]}
    - name: collection
      path: '/collections/{{uid}}'
      operations:
      - {name: get-collection, method: GET, inputParameters: [{name: uid, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: postman-collection-import-capability-rest
    description: REST surface for Postman import.
    resources:
    - {name: import, path: '/import/{{uid}}', operations: [{method: POST, name: import-collection, inputParameters: [{name: uid, in: path, type: string}], call: postman.get-collection}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: postman-collection-import-capability-mcp
    description: MCP for Postman import.
    tools:
    - {name: list-collections, hints: {readOnly: true}, call: postman.list-collections}
    - name: import-collection
      inputParameters: [{name: uid, type: string, required: true}]
      call: postman.get-collection
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: postman-collection-import-capability-skills
    description: Skill for Postman import.
    skills:
    - name: postman-collection-import-capability
      description: Postman collection import.
      location: file:///opt/naftiko/skills/postman-collection-import-capability
      allowed-tools: list-collections,import-collection
      tools:
      - {name: list-collections, from: {sourceNamespace: postman-collection-import-capability-mcp, action: list-collections}}
      - {name: import-collection, from: {sourceNamespace: postman-collection-import-capability-mcp, action: import-collection}}
