naftiko: 1.0.0-alpha2
info:
  title: Tax Calc Agent Skill
  description: A tax-calculation Agent Skill wrapping a sales-tax API for inline use in finance agent flows.
  tags: [Naftiko, Tax, Agent Skill]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: avatax-env
  keys: {AVATAX_USERNAME: AVATAX_USERNAME, AVATAX_PASSWORD: AVATAX_PASSWORD}
capability:
  consumes:
  - namespace: avatax
    type: http
    baseUri: https://rest.avatax.com
    authentication: {type: basic, username: '{{AVATAX_USERNAME}}', password: '{{AVATAX_PASSWORD}}'}
    resources:
    - {name: transactions, path: /api/v2/transactions/create, operations: [{name: create-transaction, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: tax-calc-agent-skill-rest
    description: REST surface for tax calc.
    resources:
    - {name: calc, path: /calc, operations: [{method: POST, name: calc-tax, call: avatax.create-transaction}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: tax-calc-agent-skill-mcp
    description: MCP for tax calc.
    tools:
    - {name: calc-tax, call: avatax.create-transaction}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: tax-calc-agent-skill-skills
    description: Skill for tax calc.
    skills:
    - name: tax-calc-agent-skill
      description: Tax calc agent skill.
      location: file:///opt/naftiko/skills/tax-calc-agent-skill
      allowed-tools: calc-tax
      tools:
      - {name: calc-tax, from: {sourceNamespace: tax-calc-agent-skill-mcp, action: calc-tax}}
