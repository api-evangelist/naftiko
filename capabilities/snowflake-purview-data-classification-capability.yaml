naftiko: 1.0.0-alpha2
info:
  title: Snowflake Purview Data Classification Capability
  description: A Naftiko capability over Snowflake exposing governed read access tied to data trust/classification posture.
  tags: [Naftiko, Snowflake]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: snowflake-env
  keys: {SNOWFLAKE_ACCOUNT: SNOWFLAKE_ACCOUNT, SNOWFLAKE_TOKEN: SNOWFLAKE_TOKEN}
capability:
  consumes:
  - namespace: snowflake
    type: http
    baseUri: https://{{SNOWFLAKE_ACCOUNT}}.snowflakecomputing.com
    authentication: {type: bearer, token: '{{SNOWFLAKE_TOKEN}}'}
    resources:
    - {name: statements, path: /api/v2/statements, operations: [{name: run-sql, method: POST}]}
    - name: statement
      path: /api/v2/statements/{{statement_handle}}
      operations:
      - {name: get-statement, method: GET, inputParameters: [{name: statement_handle, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: snowflake-purview-data-classification-capability-rest
    description: REST surface for governed Snowflake reads.
    resources:
    - {name: query, path: /query, operations: [{method: POST, name: run-sql, call: snowflake.run-sql}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: snowflake-purview-data-classification-capability-mcp
    description: MCP for governed Snowflake reads.
    tools:
    - {name: run-sql, call: snowflake.run-sql}
    - name: get-statement
      hints: {readOnly: true}
      inputParameters: [{name: statement_handle, type: string, required: true}]
      call: snowflake.get-statement
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: snowflake-purview-data-classification-capability-skills
    description: Skill for governed Snowflake.
    skills:
    - name: snowflake-purview-data-classification-capability
      description: Governed Snowflake access.
      location: file:///opt/naftiko/skills/snowflake-purview-data-classification-capability
      allowed-tools: run-sql,get-statement
      tools:
      - {name: run-sql, from: {sourceNamespace: snowflake-purview-data-classification-capability-mcp, action: run-sql}}
      - {name: get-statement, from: {sourceNamespace: snowflake-purview-data-classification-capability-mcp, action: get-statement}}
