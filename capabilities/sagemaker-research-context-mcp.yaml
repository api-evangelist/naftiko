naftiko: 1.0.0-alpha2
info:
  title: Sagemaker Research Context Mcp
  description: A capability over Amazon SageMaker for ML research context — endpoints, training jobs, processing jobs as MCP tools.
  tags: [Naftiko, SageMaker, ML]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: aws-env
  keys: {AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY, AWS_REGION: AWS_REGION}
capability:
  consumes:
  - namespace: sagemaker
    type: http
    baseUri: https://api.sagemaker.{{AWS_REGION}}.amazonaws.com
    authentication: {type: aws-sig-v4, accessKeyId: '{{AWS_ACCESS_KEY_ID}}', secretKey: '{{AWS_SECRET_ACCESS_KEY}}', region: '{{AWS_REGION}}', service: sagemaker}
    resources:
    - {name: endpoints, path: /, operations: [{name: list-endpoints, method: POST, description: SageMaker ListEndpoints.}]}
    - {name: training-jobs, path: /, operations: [{name: list-training-jobs, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: sagemaker-research-context-mcp-rest
    description: REST surface for SageMaker research context.
    resources:
    - {name: endpoints, path: /endpoints, operations: [{method: GET, name: list-endpoints, call: sagemaker.list-endpoints}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: sagemaker-research-context-mcp-mcp
    description: MCP for SageMaker research context.
    tools:
    - {name: list-endpoints, hints: {readOnly: true}, call: sagemaker.list-endpoints}
    - {name: list-training-jobs, hints: {readOnly: true}, call: sagemaker.list-training-jobs}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: sagemaker-research-context-mcp-skills
    description: Skill for SageMaker research context.
    skills:
    - name: sagemaker-research-context-mcp
      description: SageMaker research context.
      location: file:///opt/naftiko/skills/sagemaker-research-context-mcp
      allowed-tools: list-endpoints,list-training-jobs
      tools:
      - {name: list-endpoints, from: {sourceNamespace: sagemaker-research-context-mcp-mcp, action: list-endpoints}}
      - {name: list-training-jobs, from: {sourceNamespace: sagemaker-research-context-mcp-mcp, action: list-training-jobs}}
