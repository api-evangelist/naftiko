naftiko: 1.0.0-alpha2
info:
  title: Servicenow Engagement Workflow Mcp
  description: A capability over ServiceNow Engagement workflows, exposing case creation and lookup as MCP tools.
  tags: [Naftiko, ServiceNow, Engagement]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: servicenow-env
  keys: {SN_HOST: SN_HOST, SN_USER: SN_USER, SN_PASSWORD: SN_PASSWORD}
capability:
  consumes:
  - namespace: servicenow
    type: http
    baseUri: https://{{SN_HOST}}
    authentication: {type: basic, username: '{{SN_USER}}', password: '{{SN_PASSWORD}}'}
    resources:
    - {name: cases, path: /api/now/table/case, operations: [{name: list-cases, method: GET}, {name: create-case, method: POST}]}
    - name: case
      path: /api/now/table/case/{{sys_id}}
      operations:
      - {name: get-case, method: GET, inputParameters: [{name: sys_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: servicenow-engagement-workflow-mcp-rest
    description: REST surface for ServiceNow Engagement.
    resources:
    - {name: cases, path: /cases, operations: [{method: POST, name: create-case, call: servicenow.create-case}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: servicenow-engagement-workflow-mcp-mcp
    description: MCP for ServiceNow Engagement.
    tools:
    - {name: list-cases, hints: {readOnly: true}, call: servicenow.list-cases}
    - {name: create-case, call: servicenow.create-case}
    - name: get-case
      hints: {readOnly: true}
      inputParameters: [{name: sys_id, type: string, required: true}]
      call: servicenow.get-case
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: servicenow-engagement-workflow-mcp-skills
    description: Skill for ServiceNow Engagement.
    skills:
    - name: servicenow-engagement-workflow-mcp
      description: ServiceNow Engagement workflows.
      location: file:///opt/naftiko/skills/servicenow-engagement-workflow-mcp
      allowed-tools: list-cases,create-case,get-case
      tools:
      - {name: list-cases, from: {sourceNamespace: servicenow-engagement-workflow-mcp-mcp, action: list-cases}}
      - {name: create-case, from: {sourceNamespace: servicenow-engagement-workflow-mcp-mcp, action: create-case}}
      - {name: get-case, from: {sourceNamespace: servicenow-engagement-workflow-mcp-mcp, action: get-case}}
