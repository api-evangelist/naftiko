naftiko: 1.0.0-alpha2
info:
  title: Sailpoint Identity Governance Capability
  description: A capability over SailPoint Identity Security Cloud for identity governance — accounts, access reviews, certifications.
  tags: [Naftiko, SailPoint, Identity]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: sailpoint-env
  keys: {SAILPOINT_HOST: SAILPOINT_HOST, SAILPOINT_TOKEN: SAILPOINT_TOKEN}
capability:
  consumes:
  - namespace: sailpoint
    type: http
    baseUri: https://{{SAILPOINT_HOST}}
    authentication: {type: bearer, token: '{{SAILPOINT_TOKEN}}'}
    resources:
    - {name: accounts, path: /v3/accounts, operations: [{name: list-accounts, method: GET}]}
    - {name: certifications, path: /v3/certifications, operations: [{name: list-certifications, method: GET}]}
    - name: certification
      path: /v3/certifications/{{id}}
      operations:
      - {name: get-certification, method: GET, inputParameters: [{name: id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: sailpoint-identity-governance-capability-rest
    description: REST surface for SailPoint identity governance.
    resources:
    - {name: certifications, path: /certifications, operations: [{method: GET, name: list-certifications, call: sailpoint.list-certifications}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: sailpoint-identity-governance-capability-mcp
    description: MCP for SailPoint identity governance.
    tools:
    - {name: list-accounts, hints: {readOnly: true}, call: sailpoint.list-accounts}
    - {name: list-certifications, hints: {readOnly: true}, call: sailpoint.list-certifications}
    - name: get-certification
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: sailpoint.get-certification
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: sailpoint-identity-governance-capability-skills
    description: Skill for SailPoint identity governance.
    skills:
    - name: sailpoint-identity-governance-capability
      description: SailPoint identity governance.
      location: file:///opt/naftiko/skills/sailpoint-identity-governance-capability
      allowed-tools: list-accounts,list-certifications,get-certification
      tools:
      - {name: list-accounts, from: {sourceNamespace: sailpoint-identity-governance-capability-mcp, action: list-accounts}}
      - {name: list-certifications, from: {sourceNamespace: sailpoint-identity-governance-capability-mcp, action: list-certifications}}
      - {name: get-certification, from: {sourceNamespace: sailpoint-identity-governance-capability-mcp, action: get-certification}}
