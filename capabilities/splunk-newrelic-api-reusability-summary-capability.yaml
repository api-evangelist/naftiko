naftiko: 1.0.0-alpha2
info:
  title: Splunk Newrelic Api Reusability Summary Capability
  description: A capability summarizing API reusability metrics across Splunk + New Relic instrumented services.
  tags: [Naftiko, Splunk, New Relic, Reusability]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: splunk-env
  keys: {SPLUNK_HOST: SPLUNK_HOST, SPLUNK_TOKEN: SPLUNK_TOKEN}
- namespace: newrelic-env
  keys: {NR_API_KEY: NR_API_KEY}
capability:
  consumes:
  - namespace: splunk
    type: http
    baseUri: https://{{SPLUNK_HOST}}
    authentication: {type: bearer, token: '{{SPLUNK_TOKEN}}'}
    resources:
    - {name: search-jobs, path: /services/search/jobs, operations: [{name: query-splunk, method: POST}]}
  - namespace: newrelic
    type: http
    baseUri: https://api.newrelic.com
    authentication: {type: bearer, token: '{{NR_API_KEY}}'}
    resources:
    - {name: nrql, path: /graphql, operations: [{name: query-nrql, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: splunk-newrelic-api-reusability-summary-capability-rest
    description: REST surface for reusability summary.
    resources:
    - {name: summary, path: /summary, operations: [{method: GET, name: get-reusability-summary, call: splunk.query-splunk}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: splunk-newrelic-api-reusability-summary-capability-mcp
    description: MCP for reusability summary.
    tools:
    - {name: query-splunk, call: splunk.query-splunk}
    - {name: query-nrql, hints: {readOnly: true}, call: newrelic.query-nrql}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: splunk-newrelic-api-reusability-summary-capability-skills
    description: Skill for reusability summary.
    skills:
    - name: splunk-newrelic-api-reusability-summary-capability
      description: Splunk + New Relic reusability summary.
      location: file:///opt/naftiko/skills/splunk-newrelic-api-reusability-summary-capability
      allowed-tools: query-splunk,query-nrql
      tools:
      - {name: query-splunk, from: {sourceNamespace: splunk-newrelic-api-reusability-summary-capability-mcp, action: query-splunk}}
      - {name: query-nrql, from: {sourceNamespace: splunk-newrelic-api-reusability-summary-capability-mcp, action: query-nrql}}
