naftiko: 1.0.0-alpha2
info:
  title: Rightsize Airline Context Capability
  description: A capability that right-sizes airline data (flights, fares, ancillaries) for AI consumption — strips verbose IATA NDC structures.
  tags: [Naftiko, Airline, Rightsize]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: amadeus-env
  keys: {AMADEUS_TOKEN: AMADEUS_TOKEN}
capability:
  consumes:
  - namespace: amadeus
    type: http
    baseUri: https://api.amadeus.com
    authentication: {type: bearer, token: '{{AMADEUS_TOKEN}}'}
    resources:
    - {name: flight-offers, path: /v2/shopping/flight-offers, operations: [{name: search-flights, method: GET}]}
    - name: flight-status
      path: /v2/schedule/flights
      operations: [{name: get-flight-status, method: GET}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: rightsize-airline-context-capability-rest
    description: REST surface for right-sized airline context.
    resources:
    - {name: flights, path: /flights, operations: [{method: GET, name: search-flights-rightsized, call: amadeus.search-flights}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: rightsize-airline-context-capability-mcp
    description: MCP for right-sized airline context.
    tools:
    - {name: search-flights-rightsized, hints: {readOnly: true}, call: amadeus.search-flights}
    - {name: get-flight-status, hints: {readOnly: true}, call: amadeus.get-flight-status}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: rightsize-airline-context-capability-skills
    description: Skill for right-sized airline context.
    skills:
    - name: rightsize-airline-context-capability
      description: Right-sized airline context.
      location: file:///opt/naftiko/skills/rightsize-airline-context-capability
      allowed-tools: search-flights-rightsized,get-flight-status
      tools:
      - {name: search-flights-rightsized, from: {sourceNamespace: rightsize-airline-context-capability-mcp, action: search-flights-rightsized}}
      - {name: get-flight-status, from: {sourceNamespace: rightsize-airline-context-capability-mcp, action: get-flight-status}}
