naftiko: 1.0.0-alpha2
info:
  title: Financial Services Gateway Mirror
  description: A capability that mirrors a financial-services API gateway (Kong / Apigee) and exposes governed read access to mirrored APIs.
  tags: [Naftiko, Kong, Financial Services]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: kong-env
  keys: {KONG_HOST: KONG_HOST, KONG_TOKEN: KONG_TOKEN}
capability:
  consumes:
  - namespace: kong
    type: http
    baseUri: https://{{KONG_HOST}}
    authentication: {type: bearer, token: '{{KONG_TOKEN}}'}
    resources:
    - {name: services, path: /services, operations: [{name: list-services, method: GET}]}
    - name: service
      path: /services/{{service_id}}
      operations:
      - {name: get-service, method: GET, inputParameters: [{name: service_id, in: path}]}
    - name: routes
      path: /routes
      operations: [{name: list-routes, method: GET}]
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: financial-services-gateway-mirror-rest
    description: REST surface for FS gateway mirror.
    resources:
    - {name: services, path: /mirrored-services, operations: [{method: GET, name: list-mirrored-services, call: kong.list-services}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: financial-services-gateway-mirror-mcp
    description: MCP for FS gateway mirror.
    tools:
    - {name: list-mirrored-services, hints: {readOnly: true}, call: kong.list-services}
    - name: get-service
      hints: {readOnly: true}
      inputParameters: [{name: service_id, type: string, required: true}]
      call: kong.get-service
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: financial-services-gateway-mirror-skills
    description: Skill for FS gateway mirror.
    skills:
    - name: financial-services-gateway-mirror
      description: Financial-services gateway mirror.
      location: file:///opt/naftiko/skills/financial-services-gateway-mirror
      allowed-tools: list-mirrored-services,get-service
      tools:
      - {name: list-mirrored-services, from: {sourceNamespace: financial-services-gateway-mirror-mcp, action: list-mirrored-services}}
      - {name: get-service, from: {sourceNamespace: financial-services-gateway-mirror-mcp, action: get-service}}
