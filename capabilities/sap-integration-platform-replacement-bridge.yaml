naftiko: 1.0.0-alpha2
info:
  title: Sap Integration Platform Replacement Bridge
  description: A bridge capability replacing SAP Integration Suite endpoints with Naftiko-managed equivalents for migration scenarios.
  tags: [Naftiko, SAP, Integration]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: sap-cpi-env
  keys: {SAP_CPI_HOST: SAP_CPI_HOST, SAP_CPI_TOKEN: SAP_CPI_TOKEN}
capability:
  consumes:
  - namespace: sap-cpi
    type: http
    baseUri: https://{{SAP_CPI_HOST}}
    authentication: {type: bearer, token: '{{SAP_CPI_TOKEN}}'}
    resources:
    - {name: iflows, path: /api/v1/IntegrationFlows, operations: [{name: list-iflows, method: GET}]}
    - name: iflow
      path: /api/v1/IntegrationFlows('{{flow_id}}')
      operations:
      - {name: get-iflow, method: GET, inputParameters: [{name: flow_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: sap-integration-platform-replacement-bridge-rest
    description: REST surface for SAP integration replacement.
    resources:
    - {name: iflows, path: /iflows, operations: [{method: GET, name: list-iflows, call: sap-cpi.list-iflows}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: sap-integration-platform-replacement-bridge-mcp
    description: MCP for SAP integration replacement.
    tools:
    - {name: list-iflows, hints: {readOnly: true}, call: sap-cpi.list-iflows}
    - name: get-iflow
      hints: {readOnly: true}
      inputParameters: [{name: flow_id, type: string, required: true}]
      call: sap-cpi.get-iflow
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: sap-integration-platform-replacement-bridge-skills
    description: Skill for SAP integration replacement.
    skills:
    - name: sap-integration-platform-replacement-bridge
      description: SAP Integration Suite replacement bridge.
      location: file:///opt/naftiko/skills/sap-integration-platform-replacement-bridge
      allowed-tools: list-iflows,get-iflow
      tools:
      - {name: list-iflows, from: {sourceNamespace: sap-integration-platform-replacement-bridge-mcp, action: list-iflows}}
      - {name: get-iflow, from: {sourceNamespace: sap-integration-platform-replacement-bridge-mcp, action: get-iflow}}
