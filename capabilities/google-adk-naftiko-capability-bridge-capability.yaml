naftiko: 1.0.0-alpha2
info:
  title: Google Adk Naftiko Capability Bridge Capability
  description: A bridge capability between Google's Agent Development Kit (ADK) and Naftiko — Naftiko capabilities surface as ADK-callable tools.
  tags: [Naftiko, Google ADK, Bridge]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: capabilities, path: /v1/capabilities, operations: [{name: list-capabilities, method: GET}]}
    - name: capability-invoke
      path: /v1/capabilities/{{capability_id}}/invoke
      operations:
      - {name: invoke-capability, method: POST, inputParameters: [{name: capability_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: google-adk-naftiko-capability-bridge-capability-rest
    description: ADK-shaped REST surface for Naftiko capabilities.
    resources:
    - {name: tools, path: /adk/tools, operations: [{method: GET, name: list-adk-tools, call: naftiko-control.list-capabilities}]}
    - name: invoke
      path: /adk/tools/{{capability_id}}/invoke
      operations:
      - {method: POST, name: invoke-adk-tool, inputParameters: [{name: capability_id, in: path, type: string}], call: naftiko-control.invoke-capability}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: google-adk-naftiko-capability-bridge-capability-mcp
    description: MCP mirror of ADK bridge.
    tools:
    - {name: list-adk-tools, hints: {readOnly: true}, call: naftiko-control.list-capabilities}
    - name: invoke-adk-tool
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-control.invoke-capability
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: google-adk-naftiko-capability-bridge-capability-skills
    description: Skill for ADK bridge.
    skills:
    - name: google-adk-naftiko-capability-bridge-capability
      description: Google ADK bridge.
      location: file:///opt/naftiko/skills/google-adk-naftiko-capability-bridge-capability
      allowed-tools: list-adk-tools,invoke-adk-tool
      tools:
      - {name: list-adk-tools, from: {sourceNamespace: google-adk-naftiko-capability-bridge-capability-mcp, action: list-adk-tools}}
      - {name: invoke-adk-tool, from: {sourceNamespace: google-adk-naftiko-capability-bridge-capability-mcp, action: invoke-adk-tool}}
