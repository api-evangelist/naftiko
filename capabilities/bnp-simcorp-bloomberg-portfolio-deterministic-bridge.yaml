naftiko: 1.0.0-alpha2
info:
  title: Bnp Simcorp Bloomberg Portfolio Deterministic Bridge
  description: A bridge capability for BNP Paribas joining SimCorp Dimension and Bloomberg AIM into one deterministic portfolio object.
  tags: [Naftiko, BNP, SimCorp, Bloomberg]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: simcorp-env
  keys: {SIMCORP_HOST: SIMCORP_HOST, SIMCORP_TOKEN: SIMCORP_TOKEN}
- namespace: bloomberg-env
  keys: {BLOOMBERG_TOKEN: BLOOMBERG_TOKEN}
capability:
  consumes:
  - namespace: simcorp
    type: http
    baseUri: https://{{SIMCORP_HOST}}
    authentication: {type: bearer, token: '{{SIMCORP_TOKEN}}'}
    resources:
    - name: portfolio
      path: /api/v1/portfolios/{{portfolio_id}}
      operations:
      - {name: get-simcorp-portfolio, method: GET, inputParameters: [{name: portfolio_id, in: path}]}
  - namespace: aim
    type: http
    baseUri: https://api.bloomberg.com
    authentication: {type: bearer, token: '{{BLOOMBERG_TOKEN}}'}
    resources:
    - name: aim-portfolio
      path: /eap/aim/v1/portfolios/{{portfolio_id}}
      operations:
      - {name: get-aim-portfolio, method: GET, inputParameters: [{name: portfolio_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: bnp-simcorp-bloomberg-portfolio-deterministic-bridge-rest
    description: REST surface for SimCorp+AIM bridge.
    resources:
    - name: portfolio
      path: /portfolios/{{portfolio_id}}
      operations:
      - {method: GET, name: get-bridged-portfolio, inputParameters: [{name: portfolio_id, in: path, type: string}], call: simcorp.get-simcorp-portfolio}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: bnp-simcorp-bloomberg-portfolio-deterministic-bridge-mcp
    description: MCP for SimCorp+AIM bridge.
    tools:
    - name: get-bridged-portfolio
      hints: {readOnly: true}
      inputParameters: [{name: portfolio_id, type: string, required: true}]
      call: simcorp.get-simcorp-portfolio
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: bnp-simcorp-bloomberg-portfolio-deterministic-bridge-skills
    description: Skill for SimCorp+AIM bridge.
    skills:
    - name: bnp-simcorp-bloomberg-portfolio-deterministic-bridge
      description: SimCorp + Bloomberg AIM bridged portfolio.
      location: file:///opt/naftiko/skills/bnp-simcorp-bloomberg-portfolio-deterministic-bridge
      allowed-tools: get-bridged-portfolio
      tools:
      - {name: get-bridged-portfolio, from: {sourceNamespace: bnp-simcorp-bloomberg-portfolio-deterministic-bridge-mcp, action: get-bridged-portfolio}}
