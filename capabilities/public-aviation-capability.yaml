naftiko: 1.0.0-alpha2
info:
  title: Public Aviation Capability
  description: A capability over public aviation data (FAA, OpenSky) for tracking flights and airport metadata.
  tags: [Naftiko, Aviation, OpenSky]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: opensky-env
  keys: {OPENSKY_USERNAME: OPENSKY_USERNAME, OPENSKY_PASSWORD: OPENSKY_PASSWORD}
capability:
  consumes:
  - namespace: opensky
    type: http
    baseUri: https://opensky-network.org
    authentication: {type: basic, username: '{{OPENSKY_USERNAME}}', password: '{{OPENSKY_PASSWORD}}'}
    resources:
    - {name: states-all, path: /api/states/all, operations: [{name: get-states-all, method: GET}]}
    - {name: flights-all, path: /api/flights/all, operations: [{name: get-flights-window, method: GET}]}
    - name: arrivals
      path: /api/flights/arrival
      operations:
      - {name: get-arrivals, method: GET, inputParameters: [{name: airport, in: query}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: public-aviation-capability-rest
    description: REST surface for public aviation data.
    resources:
    - {name: states, path: /states, operations: [{method: GET, name: get-states-all, call: opensky.get-states-all}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: public-aviation-capability-mcp
    description: MCP for public aviation data.
    tools:
    - {name: get-states-all, hints: {readOnly: true}, call: opensky.get-states-all}
    - {name: get-flights-window, hints: {readOnly: true}, call: opensky.get-flights-window}
    - name: get-arrivals
      hints: {readOnly: true}
      inputParameters: [{name: airport, type: string, required: true}]
      call: opensky.get-arrivals
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: public-aviation-capability-skills
    description: Skill for public aviation.
    skills:
    - name: public-aviation-capability
      description: Public aviation data.
      location: file:///opt/naftiko/skills/public-aviation-capability
      allowed-tools: get-states-all,get-flights-window,get-arrivals
      tools:
      - {name: get-states-all, from: {sourceNamespace: public-aviation-capability-mcp, action: get-states-all}}
      - {name: get-flights-window, from: {sourceNamespace: public-aviation-capability-mcp, action: get-flights-window}}
      - {name: get-arrivals, from: {sourceNamespace: public-aviation-capability-mcp, action: get-arrivals}}
