naftiko: 1.0.0-alpha2
info:
  title: Platform Bundle Backstage Template
  description: A Backstage software template that bundles a Naftiko platform (capabilities + skills + rules) into one scaffoldable unit.
  tags: [Naftiko, Backstage, Bundle]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: backstage-env
  keys: {BACKSTAGE_HOST: BACKSTAGE_HOST, BACKSTAGE_TOKEN: BACKSTAGE_TOKEN}
capability:
  consumes:
  - namespace: backstage
    type: http
    baseUri: https://{{BACKSTAGE_HOST}}
    authentication: {type: bearer, token: '{{BACKSTAGE_TOKEN}}'}
    resources:
    - {name: scaffolder-tasks, path: /api/scaffolder/v2/tasks, operations: [{name: scaffold-platform-bundle, method: POST}]}
    - name: task
      path: /api/scaffolder/v2/tasks/{{task_id}}
      operations:
      - {name: get-task, method: GET, inputParameters: [{name: task_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: platform-bundle-backstage-template-rest
    description: REST surface for platform-bundle scaffolding.
    resources:
    - {name: scaffold, path: /scaffold, operations: [{method: POST, name: scaffold-platform-bundle, call: backstage.scaffold-platform-bundle}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: platform-bundle-backstage-template-mcp
    description: MCP for platform-bundle scaffolding.
    tools:
    - {name: scaffold-platform-bundle, call: backstage.scaffold-platform-bundle}
    - name: get-task
      hints: {readOnly: true}
      inputParameters: [{name: task_id, type: string, required: true}]
      call: backstage.get-task
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: platform-bundle-backstage-template-skills
    description: Skill for platform-bundle scaffolding.
    skills:
    - name: platform-bundle-backstage-template
      description: Platform-bundle Backstage template.
      location: file:///opt/naftiko/skills/platform-bundle-backstage-template
      allowed-tools: scaffold-platform-bundle,get-task
      tools:
      - {name: scaffold-platform-bundle, from: {sourceNamespace: platform-bundle-backstage-template-mcp, action: scaffold-platform-bundle}}
      - {name: get-task, from: {sourceNamespace: platform-bundle-backstage-template-mcp, action: get-task}}
