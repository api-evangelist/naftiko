naftiko: 1.0.0-alpha2
info:
  title: Team Lead Microservice Dedup Capability
  description: A capability that detects duplicate microservices across teams by comparing OpenAPI specs and surfacing them for the team lead.
  tags: [Naftiko, Microservice, Dedup]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: github-env
  keys: {GITHUB_TOKEN: GITHUB_TOKEN}
capability:
  consumes:
  - namespace: github
    type: http
    baseUri: https://api.github.com
    authentication: {type: bearer, token: '{{GITHUB_TOKEN}}'}
    resources:
    - {name: search-code, path: /search/code, operations: [{name: search-openapi-specs, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: team-lead-microservice-dedup-capability-rest
    description: REST surface for microservice dedup.
    resources:
    - {name: duplicates, path: /duplicates, operations: [{method: GET, name: find-duplicates, call: github.search-openapi-specs}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: team-lead-microservice-dedup-capability-mcp
    description: MCP for microservice dedup.
    tools:
    - {name: find-duplicates, hints: {readOnly: true}, call: github.search-openapi-specs}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: team-lead-microservice-dedup-capability-skills
    description: Skill for microservice dedup.
    skills:
    - name: team-lead-microservice-dedup-capability
      description: Microservice dedup.
      location: file:///opt/naftiko/skills/team-lead-microservice-dedup-capability
      allowed-tools: find-duplicates
      tools:
      - {name: find-duplicates, from: {sourceNamespace: team-lead-microservice-dedup-capability-mcp, action: find-duplicates}}
