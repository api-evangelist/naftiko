naftiko: 1.0.0-alpha2
info:
  title: Schneider Registry Seed Collection
  description: Schneider Electric seed collection for the Naftiko registry — bootstraps the Schneider tenant with a curated capability set.
  tags: [Naftiko, Schneider, Registry, Seed]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-registry
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: registry-entries, path: /v1/registry/entries, operations: [{name: list-registry-entries, method: GET}, {name: bulk-seed, method: POST}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-registry-seed-collection-rest
    description: REST surface for registry seed.
    resources:
    - {name: seed, path: /seed, operations: [{method: POST, name: bulk-seed, call: naftiko-registry.bulk-seed}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-registry-seed-collection-mcp
    description: MCP for registry seed.
    tools:
    - {name: list-registry-entries, hints: {readOnly: true}, call: naftiko-registry.list-registry-entries}
    - {name: bulk-seed, call: naftiko-registry.bulk-seed}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-registry-seed-collection-skills
    description: Skill for registry seed.
    skills:
    - name: schneider-registry-seed-collection
      description: Schneider registry seed.
      location: file:///opt/naftiko/skills/schneider-registry-seed-collection
      allowed-tools: list-registry-entries,bulk-seed
      tools:
      - {name: list-registry-entries, from: {sourceNamespace: schneider-registry-seed-collection-mcp, action: list-registry-entries}}
      - {name: bulk-seed, from: {sourceNamespace: schneider-registry-seed-collection-mcp, action: bulk-seed}}
