naftiko: 1.0.0-alpha2
info:
  title: Payer Fhir Capability
  description: A FHIR capability over a payer (insurance) backend exposing Patient, Coverage, ExplanationOfBenefit as governed REST + MCP.
  tags: [Naftiko, FHIR, Payer]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: fhir-env
  keys: {FHIR_HOST: FHIR_HOST, FHIR_TOKEN: FHIR_TOKEN}
capability:
  consumes:
  - namespace: fhir
    type: http
    baseUri: https://{{FHIR_HOST}}
    authentication: {type: bearer, token: '{{FHIR_TOKEN}}'}
    resources:
    - {name: patient, path: '/Patient/{{id}}', operations: [{name: get-patient, method: GET, inputParameters: [{name: id, in: path}]}]}
    - {name: coverage, path: /Coverage, operations: [{name: search-coverage, method: GET}]}
    - {name: eob, path: /ExplanationOfBenefit, operations: [{name: search-eob, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: payer-fhir-capability-rest
    description: Governed payer FHIR surface.
    resources:
    - {name: patient, path: '/patients/{{id}}', operations: [{method: GET, name: get-patient, inputParameters: [{name: id, in: path, type: string}], call: fhir.get-patient}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: payer-fhir-capability-mcp
    description: MCP for payer FHIR.
    tools:
    - name: get-patient
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: fhir.get-patient
    - {name: search-coverage, hints: {readOnly: true}, call: fhir.search-coverage}
    - {name: search-eob, hints: {readOnly: true}, call: fhir.search-eob}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: payer-fhir-capability-skills
    description: Skill for payer FHIR.
    skills:
    - name: payer-fhir-capability
      description: Payer FHIR access.
      location: file:///opt/naftiko/skills/payer-fhir-capability
      allowed-tools: get-patient,search-coverage,search-eob
      tools:
      - {name: get-patient, from: {sourceNamespace: payer-fhir-capability-mcp, action: get-patient}}
      - {name: search-coverage, from: {sourceNamespace: payer-fhir-capability-mcp, action: search-coverage}}
      - {name: search-eob, from: {sourceNamespace: payer-fhir-capability-mcp, action: search-eob}}
