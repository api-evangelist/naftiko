naftiko: 1.0.0-alpha2
info:
  title: Solutions Architect Checklist Capability
  description: A capability that codifies the solutions-architect onboarding checklist as a runnable workflow with progress tracking.
  tags: [Naftiko, Solutions Architect, Checklist]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-control
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: checklists, path: /v1/checklists, operations: [{name: list-checklists, method: GET}]}
    - name: checklist-progress
      path: '/v1/checklists/{{checklist_id}}/progress'
      operations:
      - {name: get-progress, method: GET, inputParameters: [{name: checklist_id, in: path}]}
      - {name: update-progress, method: POST, inputParameters: [{name: checklist_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: solutions-architect-checklist-capability-rest
    description: REST surface for SA checklist.
    resources:
    - {name: progress, path: '/progress/{{checklist_id}}', operations: [{method: GET, name: get-progress, inputParameters: [{name: checklist_id, in: path, type: string}], call: naftiko-control.get-progress}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: solutions-architect-checklist-capability-mcp
    description: MCP for SA checklist.
    tools:
    - {name: list-checklists, hints: {readOnly: true}, call: naftiko-control.list-checklists}
    - name: get-progress
      hints: {readOnly: true}
      inputParameters: [{name: checklist_id, type: string, required: true}]
      call: naftiko-control.get-progress
    - name: update-progress
      inputParameters: [{name: checklist_id, type: string, required: true}]
      call: naftiko-control.update-progress
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: solutions-architect-checklist-capability-skills
    description: Skill for SA checklist.
    skills:
    - name: solutions-architect-checklist-capability
      description: Solutions architect checklist.
      location: file:///opt/naftiko/skills/solutions-architect-checklist-capability
      allowed-tools: list-checklists,get-progress,update-progress
      tools:
      - {name: list-checklists, from: {sourceNamespace: solutions-architect-checklist-capability-mcp, action: list-checklists}}
      - {name: get-progress, from: {sourceNamespace: solutions-architect-checklist-capability-mcp, action: get-progress}}
      - {name: update-progress, from: {sourceNamespace: solutions-architect-checklist-capability-mcp, action: update-progress}}
