naftiko: 1.0.0-alpha2
info:
  title: Naftiko Contract Test Capability
  description: A capability that runs contract tests against a target capability spec, comparing live runtime responses against the OpenAPI/AsyncAPI contract.
  tags: [Naftiko, Contract Testing]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-test
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - {name: contract-tests, path: /v1/contract-tests, operations: [{name: run-contract-test, method: POST}]}
    - name: contract-test
      path: /v1/contract-tests/{{run_id}}
      operations:
      - {name: get-contract-test-result, method: GET, inputParameters: [{name: run_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: naftiko-contract-test-capability-rest
    description: REST surface for contract tests.
    resources:
    - {name: run, path: /run, operations: [{method: POST, name: run-contract-test, call: naftiko-test.run-contract-test}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: naftiko-contract-test-capability-mcp
    description: MCP for contract tests.
    tools:
    - {name: run-contract-test, call: naftiko-test.run-contract-test}
    - name: get-result
      hints: {readOnly: true}
      inputParameters: [{name: run_id, type: string, required: true}]
      call: naftiko-test.get-contract-test-result
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: naftiko-contract-test-capability-skills
    description: Skill for contract tests.
    skills:
    - name: naftiko-contract-test-capability
      description: Naftiko contract testing.
      location: file:///opt/naftiko/skills/naftiko-contract-test-capability
      allowed-tools: run-contract-test,get-result
      tools:
      - {name: run-contract-test, from: {sourceNamespace: naftiko-contract-test-capability-mcp, action: run-contract-test}}
      - {name: get-result, from: {sourceNamespace: naftiko-contract-test-capability-mcp, action: get-result}}
