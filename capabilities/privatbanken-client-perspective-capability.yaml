naftiko: 1.0.0-alpha2
info:
  title: Privatbanken Client Perspective Capability
  description: A capability over the Privatbanken (Nordic banking) API exposed from the client's perspective — accounts, holdings, transactions in one shape.
  tags: [Naftiko, Privatbanken, Banking]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: privatbanken-env
  keys: {PRIVATBANKEN_HOST: PRIVATBANKEN_HOST, PRIVATBANKEN_TOKEN: PRIVATBANKEN_TOKEN}
capability:
  consumes:
  - namespace: privatbanken
    type: http
    baseUri: https://{{PRIVATBANKEN_HOST}}
    authentication: {type: bearer, token: '{{PRIVATBANKEN_TOKEN}}'}
    resources:
    - {name: accounts, path: /api/v1/accounts, operations: [{name: list-accounts, method: GET}]}
    - name: account-holdings
      path: /api/v1/accounts/{{account_id}}/holdings
      operations:
      - {name: list-holdings, method: GET, inputParameters: [{name: account_id, in: path}]}
    - name: account-transactions
      path: /api/v1/accounts/{{account_id}}/transactions
      operations:
      - {name: list-transactions, method: GET, inputParameters: [{name: account_id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: privatbanken-client-perspective-capability-rest
    description: REST surface for client-perspective Privatbanken.
    resources:
    - {name: accounts, path: /accounts, operations: [{method: GET, name: list-accounts, call: privatbanken.list-accounts}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: privatbanken-client-perspective-capability-mcp
    description: MCP for Privatbanken.
    tools:
    - {name: list-accounts, hints: {readOnly: true}, call: privatbanken.list-accounts}
    - name: list-holdings
      hints: {readOnly: true}
      inputParameters: [{name: account_id, type: string, required: true}]
      call: privatbanken.list-holdings
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: privatbanken-client-perspective-capability-skills
    description: Skill for Privatbanken.
    skills:
    - name: privatbanken-client-perspective-capability
      description: Privatbanken client-perspective.
      location: file:///opt/naftiko/skills/privatbanken-client-perspective-capability
      allowed-tools: list-accounts,list-holdings
      tools:
      - {name: list-accounts, from: {sourceNamespace: privatbanken-client-perspective-capability-mcp, action: list-accounts}}
      - {name: list-holdings, from: {sourceNamespace: privatbanken-client-perspective-capability-mcp, action: list-holdings}}
