naftiko: 1.0.0-alpha2
info:
  title: Schneider Atlassian Jira Admin Side Observability Capability
  description: Schneider Electric admin-side observability over Atlassian Jira — projects, issues, audit logs as observability streams.
  tags: [Naftiko, Schneider, Jira, Observability]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: jira-env
  keys: {JIRA_HOST: JIRA_HOST, JIRA_USER: JIRA_USER, JIRA_TOKEN: JIRA_TOKEN}
capability:
  consumes:
  - namespace: jira
    type: http
    baseUri: https://{{JIRA_HOST}}
    authentication: {type: basic, username: '{{JIRA_USER}}', password: '{{JIRA_TOKEN}}'}
    resources:
    - {name: projects, path: /rest/api/3/project, operations: [{name: list-projects, method: GET}]}
    - {name: search-issues, path: /rest/api/3/search, operations: [{name: search-issues, method: GET}]}
    - {name: audit-records, path: /rest/api/3/auditing/record, operations: [{name: list-audit-records, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: schneider-atlassian-jira-admin-side-observability-capability-rest
    description: REST surface for Jira admin observability.
    resources:
    - {name: audit, path: /audit, operations: [{method: GET, name: list-audit-records, call: jira.list-audit-records}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: schneider-atlassian-jira-admin-side-observability-capability-mcp
    description: MCP for Jira admin observability.
    tools:
    - {name: list-projects, hints: {readOnly: true}, call: jira.list-projects}
    - {name: search-issues, hints: {readOnly: true}, call: jira.search-issues}
    - {name: list-audit-records, hints: {readOnly: true}, call: jira.list-audit-records}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: schneider-atlassian-jira-admin-side-observability-capability-skills
    description: Skill for Jira observability.
    skills:
    - name: schneider-atlassian-jira-admin-side-observability-capability
      description: Jira admin observability.
      location: file:///opt/naftiko/skills/schneider-atlassian-jira-admin-side-observability-capability
      allowed-tools: list-projects,search-issues,list-audit-records
      tools:
      - {name: list-projects, from: {sourceNamespace: schneider-atlassian-jira-admin-side-observability-capability-mcp, action: list-projects}}
      - {name: search-issues, from: {sourceNamespace: schneider-atlassian-jira-admin-side-observability-capability-mcp, action: search-issues}}
      - {name: list-audit-records, from: {sourceNamespace: schneider-atlassian-jira-admin-side-observability-capability-mcp, action: list-audit-records}}
