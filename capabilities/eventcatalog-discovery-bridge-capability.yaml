naftiko: 1.0.0-alpha2
info:
  title: Eventcatalog Discovery Bridge Capability
  description: A bridge capability between EventCatalog (event documentation) and Naftiko — discovered events appear as Naftiko event-driven capabilities automatically.
  tags: [Naftiko, EventCatalog, Discovery]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: eventcatalog-env
  keys: {EVENTCATALOG_HOST: EVENTCATALOG_HOST}
capability:
  consumes:
  - namespace: eventcatalog
    type: http
    baseUri: https://{{EVENTCATALOG_HOST}}
    resources:
    - {name: events, path: /api/events, operations: [{name: list-events, method: GET}]}
    - name: event
      path: /api/events/{{event_name}}
      operations:
      - {name: get-event, method: GET, inputParameters: [{name: event_name, in: path}]}
    - {name: services, path: /api/services, operations: [{name: list-services, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: eventcatalog-discovery-bridge-capability-rest
    description: REST surface bridging EventCatalog discovery into Naftiko.
    resources:
    - {name: events, path: /events, operations: [{method: GET, name: list-discovered-events, call: eventcatalog.list-events}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: eventcatalog-discovery-bridge-capability-mcp
    description: MCP for EventCatalog discovery.
    tools:
    - {name: list-discovered-events, hints: {readOnly: true}, call: eventcatalog.list-events}
    - name: get-event
      hints: {readOnly: true}
      inputParameters: [{name: event_name, type: string, required: true}]
      call: eventcatalog.get-event
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: eventcatalog-discovery-bridge-capability-skills
    description: Skill for EventCatalog bridge.
    skills:
    - name: eventcatalog-discovery-bridge-capability
      description: EventCatalog discovery bridge.
      location: file:///opt/naftiko/skills/eventcatalog-discovery-bridge-capability
      allowed-tools: list-discovered-events,get-event
      tools:
      - {name: list-discovered-events, from: {sourceNamespace: eventcatalog-discovery-bridge-capability-mcp, action: list-discovered-events}}
      - {name: get-event, from: {sourceNamespace: eventcatalog-discovery-bridge-capability-mcp, action: get-event}}
