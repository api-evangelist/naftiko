naftiko: 1.0.0-alpha2
info:
  title: Salesforce Event To Opportunity Bridge
  description: A bridge capability that converts external events (webform, registration, intent) into Salesforce Opportunity records.
  tags: [Naftiko, Salesforce, Opportunity]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: salesforce-env
  keys: {SF_HOST: SF_HOST, SF_TOKEN: SF_TOKEN}
capability:
  consumes:
  - namespace: salesforce
    type: http
    baseUri: https://{{SF_HOST}}
    authentication: {type: bearer, token: '{{SF_TOKEN}}'}
    resources:
    - {name: opportunities, path: /services/data/v60.0/sobjects/Opportunity, operations: [{name: create-opportunity, method: POST}]}
    - name: opportunity
      path: /services/data/v60.0/sobjects/Opportunity/{{id}}
      operations:
      - {name: get-opportunity, method: GET, inputParameters: [{name: id, in: path}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: salesforce-event-to-opportunity-bridge-rest
    description: REST surface for event→opportunity bridge.
    resources:
    - {name: bridge, path: /bridge, operations: [{method: POST, name: bridge-event-to-opportunity, call: salesforce.create-opportunity}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: salesforce-event-to-opportunity-bridge-mcp
    description: MCP for event→opportunity bridge.
    tools:
    - {name: bridge-event-to-opportunity, call: salesforce.create-opportunity}
    - name: get-opportunity
      hints: {readOnly: true}
      inputParameters: [{name: id, type: string, required: true}]
      call: salesforce.get-opportunity
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: salesforce-event-to-opportunity-bridge-skills
    description: Skill for event→opportunity bridge.
    skills:
    - name: salesforce-event-to-opportunity-bridge
      description: Event→Opportunity bridge.
      location: file:///opt/naftiko/skills/salesforce-event-to-opportunity-bridge
      allowed-tools: bridge-event-to-opportunity,get-opportunity
      tools:
      - {name: bridge-event-to-opportunity, from: {sourceNamespace: salesforce-event-to-opportunity-bridge-mcp, action: bridge-event-to-opportunity}}
      - {name: get-opportunity, from: {sourceNamespace: salesforce-event-to-opportunity-bridge-mcp, action: get-opportunity}}
