naftiko: 1.0.0-alpha2
info:
  title: Platform Ops Observability Capability
  description: A capability surfacing Naftiko platform ops observability — capability run health, latency, error rate.
  tags: [Naftiko, Platform Ops, Observability]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: naftiko-env
  keys: {NAFTIKO_API_KEY: NAFTIKO_API_KEY}
capability:
  consumes:
  - namespace: naftiko-ops
    type: http
    baseUri: https://api.naftiko.com
    authentication: {type: bearer, token: '{{NAFTIKO_API_KEY}}'}
    resources:
    - name: capability-metrics
      path: /v1/capabilities/{{capability_id}}/metrics
      operations:
      - {name: get-capability-metrics, method: GET, inputParameters: [{name: capability_id, in: path}]}
    - {name: platform-health, path: /v1/platform/health, operations: [{name: get-platform-health, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: platform-ops-observability-capability-rest
    description: REST surface for platform observability.
    resources:
    - {name: health, path: /health, operations: [{method: GET, name: get-platform-health, call: naftiko-ops.get-platform-health}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: platform-ops-observability-capability-mcp
    description: MCP for platform observability.
    tools:
    - {name: get-platform-health, hints: {readOnly: true}, call: naftiko-ops.get-platform-health}
    - name: get-capability-metrics
      hints: {readOnly: true}
      inputParameters: [{name: capability_id, type: string, required: true}]
      call: naftiko-ops.get-capability-metrics
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: platform-ops-observability-capability-skills
    description: Skill for platform observability.
    skills:
    - name: platform-ops-observability-capability
      description: Platform ops observability.
      location: file:///opt/naftiko/skills/platform-ops-observability-capability
      allowed-tools: get-platform-health,get-capability-metrics
      tools:
      - {name: get-platform-health, from: {sourceNamespace: platform-ops-observability-capability-mcp, action: get-platform-health}}
      - {name: get-capability-metrics, from: {sourceNamespace: platform-ops-observability-capability-mcp, action: get-capability-metrics}}
