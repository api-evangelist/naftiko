naftiko: 1.0.0-alpha2
info:
  title: Slack Einstein Action Capability
  description: A capability turning Salesforce Einstein actions into Slack-callable commands via the Slack web API.
  tags: [Naftiko, Slack, Einstein]
  created: '2026-05-01'
  modified: '2026-05-04'
binds:
- namespace: slack-env
  keys: {SLACK_TOKEN: SLACK_TOKEN}
capability:
  consumes:
  - namespace: slack
    type: http
    baseUri: https://slack.com
    authentication: {type: bearer, token: '{{SLACK_TOKEN}}'}
    resources:
    - {name: post-message, path: /api/chat.postMessage, operations: [{name: post-message, method: POST}]}
    - {name: commands, path: /api/commands.list, operations: [{name: list-slash-commands, method: GET}]}
  exposes:
  - type: rest
    address: 0.0.0.0
    port: 8080
    namespace: slack-einstein-action-capability-rest
    description: REST surface for Slack Einstein actions.
    resources:
    - {name: post, path: /post, operations: [{method: POST, name: post-message, call: slack.post-message}]}
  - type: mcp
    address: 0.0.0.0
    port: 3010
    namespace: slack-einstein-action-capability-mcp
    description: MCP for Slack Einstein.
    tools:
    - {name: post-message, call: slack.post-message}
    - {name: list-slash-commands, hints: {readOnly: true}, call: slack.list-slash-commands}
  - type: skill
    address: 0.0.0.0
    port: 3011
    namespace: slack-einstein-action-capability-skills
    description: Skill for Slack Einstein.
    skills:
    - name: slack-einstein-action-capability
      description: Slack Einstein action.
      location: file:///opt/naftiko/skills/slack-einstein-action-capability
      allowed-tools: post-message,list-slash-commands
      tools:
      - {name: post-message, from: {sourceNamespace: slack-einstein-action-capability-mcp, action: post-message}}
      - {name: list-slash-commands, from: {sourceNamespace: slack-einstein-action-capability-mcp, action: list-slash-commands}}
