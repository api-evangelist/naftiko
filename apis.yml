apis:
  - aid: naftiko:framework
    name: Naftiko Framework
    description: >-
      The Naftiko Framework is an open-source (Apache 2.0) engine for spec-driven
      integration. It interprets YAML capability specifications and exposes them as
      live multi-protocol services — including MCP, SKILL, and REST adapters — without
      requiring Java code. The framework supports OpenAPI 2.0/3.0/3.1 import, format
      conversion across Protobuf, XML, YAML, CSV, Avro, and JSON, OpenTelemetry tracing,
      authentication, and inline templating with Mustache and JSONPath.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/naftiko/framework
    tags:
      - Framework
      - MCP
      - Open Source
      - REST
      - SKILL
      - Spec-Driven
    properties:
      - type: Documentation
        url: https://github.com/naftiko/framework/wiki
