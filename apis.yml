  - aid: naftiko:fleet
    name: Naftiko Fleet
    description: >-
      Naftiko Fleet is the governed runtime for spec-driven integration. It makes
      capabilities discoverable through an inventory, composable across domains,
      observable through telemetry, and cost-bounded through policy controls. Fleet
      is offered as a Community Edition (freeware) with Standard and Enterprise
      editions planned, and ships with a VS Code extension and Backstage templates
      for editing, linting, and cataloguing capabilities.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/naftiko/fleet
    tags:
      - Backstage
      - Fleet
      - Governance
      - IDE
      - Runtime
      - VS Code
    properties:
      - type: Documentation
        url: https://naftiko.io
      - type: GitHubRepository
        url: https://github.com/naftiko/fleet
      - type: IDESupport
        url: https://github.com/naftiko/fleet
      - type: Integrations
        url: https://github.com/naftiko/fleet
  - aid: naftiko:capability-spec
    name: Naftiko Capability Specification
    description: >-
      The Naftiko Capability Specification is a YAML-based contract for declaring
      integration capabilities. Specs are validated by JSON Schema and committed to
      Git, producing versioned, reviewable artifacts that the framework executes and
      Fleet governs. The specification covers consume adapters (HTTP, OpenAPI),
      expose adapters (MCP, SKILL, REST), data transformations, authentication, and
      domain-driven aggregates.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/naftiko/framework/wiki/Specification
